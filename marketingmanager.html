          'Partner Manager', 'PartnerManager', 'Requestor', 'Created By'
        ];

        for (const field of fieldsToCheck) {
          const value = row[field];
          if (value) {
            const valueLower = String(value).toLowerCase();
            for (const personName of personNames) {
              // Check if the field contains the person's name
              if (valueLower.includes(personName) || personName.includes(valueLower)) {
                return true;
              }
            }
          }
        }

        // Also check if the partner is managed by this person
        // Check Partner field against managed partners list
        if (userManagedPartners && userManagedPartners.length > 0) {
          const partnerValue = row['Partner'] || row['Partner Name'] || row['PartnerName'] || '';
          if (partnerValue) {
            const partnerLower = String(partnerValue).toLowerCase();
            for (const managedPartner of userManagedPartners) {
              const managedPartnerLower = String(managedPartner).toLowerCase();
              if (partnerLower === managedPartnerLower ||
                  partnerLower.includes(managedPartnerLower) ||
                  managedPartnerLower.includes(partnerLower)) {
                console.log('Row matched by managed partner:', partnerValue, 'matches', managedPartner);
                return true;
              }
            }
          }
        }

        return false;
      };

      // Filter data based on view mode
      const filterDataByViewMode = (data, viewModeValue) => {
        console.log('filterDataByViewMode called with viewMode:', viewModeValue, 'data length:', data?.length);
        console.log('managedPartners for filtering:', managedPartners);

        // Dept mode = show all
        if (viewModeValue === 'dept') {
          console.log('Dept mode - returning all data');
          return data;
        }

        if (!data || data.length === 0) {
          return data;
        }

        const managerName = getManagerName();
        let peopleToMatch = [];
        let partnersToMatch = [];

        if (viewModeValue === 'self') {
          // Self mode - only match the current manager and their managed partners
          peopleToMatch = [managerName].filter(n => n);
          partnersToMatch = managedPartners || [];
          console.log('Self mode - matching people:', peopleToMatch, 'partners:', partnersToMatch);
        } else if (viewModeValue === 'team') {
          // Team mode - match the manager AND all their reports, plus managed partners
          const teamNames = getTeamMemberNames();
          peopleToMatch = [managerName, ...teamNames].filter(n => n);
          partnersToMatch = managedPartners || [];
          console.log('Team mode - matching people:', peopleToMatch, 'partners:', partnersToMatch);
        }

        if (peopleToMatch.length === 0 && partnersToMatch.length === 0) {
          console.log('No people or partners to match - returning all data');
          return data;
        }

        const filteredData = data.filter(row => rowInvolvesPerson(row, peopleToMatch, partnersToMatch));
        console.log('Filtered data length:', filteredData.length);
        return filteredData;
      };

      // Memoized filtered data for each dataset
      const filteredApprovalsData = useMemo(() => {
        return filterDataByViewMode(approvalsData, viewMode);
      }, [approvalsData, viewMode, authorization, managedPartners]);

      const filteredCalendarData = useMemo(() => {
        return filterDataByViewMode(calendarData, viewMode);
      }, [calendarData, viewMode, authorization, managedPartners]);

      const filteredApprovals2026Data = useMemo(() => {
        return filterDataByViewMode(approvals2026Data, viewMode);
      }, [approvals2026Data, viewMode, authorization, managedPartners]);

      const filteredPartnerActivitiesData = useMemo(() => {
        return filterDataByViewMode(partnerActivitiesData, viewMode);
      }, [partnerActivitiesData, viewMode, authorization, managedPartners]);

      // Filter for Tasks Due Now count (overdue or due within 5 days, not completed)
      const tasksDueNowCount = useMemo(() => {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const fiveDaysFromNow = new Date(today);
        fiveDaysFromNow.setDate(fiveDaysFromNow.getDate() + 5);

        return filteredPartnerActivitiesData.filter(item => {
          const status = (item['Activity Status'] || item['Status'] || '').toLowerCase();
          if (status === 'completed' || status === 'done' || status === 'complete') {
            return false;
          }
          const dueDateStr = item['Date Due'] || item['Due Date'] || item['Deadline'] || '';
          if (!dueDateStr) return false;
          try {
            const dueDate = new Date(dueDateStr);
            if (isNaN(dueDate.getTime())) return false;
            dueDate.setHours(0, 0, 0, 0);
            return dueDate <= fiveDaysFromNow;
          } catch (e) {
            return false;
          }
        }).length;
      }, [filteredPartnerActivitiesData]);

      const filteredPartnerHeatmapData = useMemo(() => {
        return filterDataByViewMode(partnerHeatmapData, viewMode);
      }, [partnerHeatmapData, viewMode, authorization, managedPartners]);

      const filteredInternalActivitiesData = useMemo(() => {
        return filterDataByViewMode(internalActivitiesData, viewMode);
      }, [internalActivitiesData, viewMode, authorization, managedPartners]);

      // Debug logging for deep link
      useEffect(() => {
        console.log('App: editItemIdFromUrl =', editItemIdFromUrl, typeof editItemIdFromUrl);
        console.log('App: editBoardIdFromUrl =', editBoardIdFromUrl, typeof editBoardIdFromUrl);
        console.log('App: MARKETING_APPROVAL_BOARD_ID =', MARKETING_APPROVAL_BOARD_ID);
        console.log('App: Board ID match for approvals?', String(editBoardIdFromUrl) === MARKETING_APPROVAL_BOARD_ID);
        console.log('App: autoEditItemId state =', autoEditItemId);
      }, []);

      useEffect(() => {
        loadData();
      }, []);

      const handleAutoEditHandled = () => {
        // Clear the auto-edit item ID after it's been handled
        setAutoEditItemId(null);
      };

      const loadData = async () => {
        setLoading(true);
        setError(null);

        try {
          // Load all data in parallel
          const [approvals, calendar, approvals2026, filters, approvalCols, calendarCols, approvals2026Cols, statsData, flowConfig, partnerActs, heatmap, internalActs, boardNames, partnerNames] = await Promise.all([
            api.call('getAllMarketingApprovals'),
            api.call('getAllMarketingCalendar'),
            api.call('getAll2026Approvals'),
            api.call('getMarketingManagerFilterOptions'),
            api.call('getBoardColumnsStructure', MARKETING_APPROVAL_BOARD_ID),
            api.call('getBoardColumnsStructure', MARKETING_CALENDAR_BOARD_ID),
            api.call('getBoardColumnsStructure', APPROVALS_2026_BOARD_ID),
            api.call('getMarketingCalendarStats'),
            api.call('get2026FlowConfig'),
            api.call('getAllPartnerActivitiesUnfiltered'),
            api.call('getAllPartnerHeatmapUnfiltered'),
            api.call('getAllInternalActivitiesUnfiltered'),
            api.call('getInternalActivityBoardNames'),
            api.call('getPartnerNamesFromSheet')
          ]);

          setApprovalsData(approvals || []);
          setCalendarData(calendar || []);
          setApprovals2026Data(approvals2026 || []);
          setFilterOptions(filters || { approvalFilters: {}, calendarFilters: {}, approvals2026Filters: {} });
          setApprovalColumns(approvalCols || []);
          setCalendarColumns(calendarCols || []);
          setApprovals2026Columns(approvals2026Cols || []);
          setChartData(statsData || { labels: [], datasets: [] });
          setFlowConfig2026(flowConfig || { groups: [], columns: [] });
          setPartnerActivitiesData(partnerActs?.data || []);
          setPartnerHeatmapData(heatmap || []);
          setInternalActivitiesData(internalActs?.data || []);
          console.log('=== Internal Board Names from API ===', boardNames);
          setInternalBoardNames(boardNames || []);
          console.log('=== Partner Names from Sheet ===', partnerNames);
          setPartnerNamesFromSheet(partnerNames || []);

        } catch (err) {
          console.error('Error loading data:', err);
          setError('Failed to load data. Please try refreshing the page.');
        } finally {
          setLoading(false);
        }
      };

      // Refresh data from Monday.com (sync boards, clear caches, then reload)
      const refreshFromMonday = async (force = false) => {
        // First check sync status
        const currentStatus = await checkSyncStatus();

        if (currentStatus && currentStatus.inProgress) {
          console.log('Sync already in progress, skipping...');
          setError('A sync is already in progress. Please wait for it to complete.');
          return;
        }

        setLoading(true);
        setError(null);
        setSyncStatus(prev => ({ ...prev, inProgress: true, message: 'Starting sync...' }));

        try {
          // First, sync from Monday.com and clear caches
          console.log('Refreshing data from Monday.com...');
          const result = await api.call('refreshMarketingDataFromMonday', force);

          // Check if sync was skipped (debounced)
          if (result.skipped) {
            console.log('Sync was skipped:', result.message);
            setSyncStatus(prev => ({ ...prev, inProgress: false, message: result.message }));
            // Still load the local data even if sync was skipped
          } else if (!result.success) {
            console.error('Refresh from Monday failed:', result.message);
            setError('Failed to sync from Monday.com: ' + result.message);
            setSyncStatus(prev => ({ ...prev, inProgress: false, message: result.message }));
            setLoading(false);
            return;
          } else {
            console.log('Monday sync complete, now loading fresh data...');
            setSyncStatus(prev => ({ ...prev, message: 'Sync complete, loading data...' }));
          }

          // Then load the fresh data
          const [approvals, calendar, approvals2026, filters, approvalCols, calendarCols, approvals2026Cols, statsData, flowConfig, partnerActs, heatmap, internalActs, boardNames, partnerNames] = await Promise.all([
            api.call('getAllMarketingApprovals'),
            api.call('getAllMarketingCalendar'),
            api.call('getAll2026Approvals'),
            api.call('getMarketingManagerFilterOptions'),
            api.call('getBoardColumnsStructure', MARKETING_APPROVAL_BOARD_ID),
            api.call('getBoardColumnsStructure', MARKETING_CALENDAR_BOARD_ID),
            api.call('getBoardColumnsStructure', APPROVALS_2026_BOARD_ID),
            api.call('getMarketingCalendarStats'),
            api.call('get2026FlowConfig'),
            api.call('getAllPartnerActivitiesUnfiltered'),
            api.call('getAllPartnerHeatmapUnfiltered'),
            api.call('getAllInternalActivitiesUnfiltered'),
            api.call('getInternalActivityBoardNames'),
            api.call('getPartnerNamesFromSheet')
          ]);

          setApprovalsData(approvals || []);
          setCalendarData(calendar || []);
          setApprovals2026Data(approvals2026 || []);
          setFilterOptions(filters || { approvalFilters: {}, calendarFilters: {}, approvals2026Filters: {} });
          setApprovalColumns(approvalCols || []);
          setCalendarColumns(calendarCols || []);
          setApprovals2026Columns(approvals2026Cols || []);
          setChartData(statsData || { labels: [], datasets: [] });
          setFlowConfig2026(flowConfig || { groups: [], columns: [] });
          setPartnerActivitiesData(partnerActs?.data || []);
          setPartnerHeatmapData(heatmap || []);
          setInternalActivitiesData(internalActs?.data || []);
          setInternalBoardNames(boardNames || []);
          setPartnerNamesFromSheet(partnerNames || []);

          // Update sync status after successful load
          setSyncStatus(prev => ({ ...prev, inProgress: false, message: 'Data loaded successfully' }));

        } catch (err) {
          console.error('Error refreshing from Monday:', err);
          setError('Failed to refresh data from Monday.com. Please try again.');
          setSyncStatus(prev => ({ ...prev, inProgress: false, message: 'Error: ' + err.message }));
        } finally {
          setLoading(false);
        }
      };

      // Helper to check if a board tab is authorized
      const isBoardAuthorized = (boardName) => {
        // If no boards specified, show all (backward compatibility)
        if (!authorization.mondayBoards || authorization.mondayBoards.length === 0) {
          console.log(`isBoardAuthorized(${boardName}): No boards specified, showing all`);
          return true;
        }
        const isAuthorized = authorization.mondayBoards.includes(boardName);
        console.log(`isBoardAuthorized(${boardName}): ${isAuthorized}, mondayBoards:`, authorization.mondayBoards);
        return isAuthorized;
      };

      // Check if any internal board is authorized (for showing the Internal Activities tab)
      // Now uses permission field from InternalBoards sheet config
      const isAnyInternalBoardAuthorized = () => {
        console.log('=== isAnyInternalBoardAuthorized ===');
        console.log('internalBoardNames:', internalBoardNames);
        console.log('authorization.mondayBoards:', authorization.mondayBoards);

        if (!authorization.mondayBoards || authorization.mondayBoards.length === 0) {
          const result = internalBoardNames.length > 0;
          console.log('No mondayBoards permissions, returning:', result);
          return result; // show if any boards configured
        }
        // Check if user has permission for any configured internal board
        const hasAny = internalBoardNames.some(board => {
          if (!board.permission) return true; // no permission required
          return authorization.mondayBoards.includes(board.permission);
        });
        console.log('isAnyInternalBoardAuthorized result:', hasAny);
        return hasAny;
      };

      // Filter internal board configs to only show authorized ones
      // Now uses permission field from InternalBoards sheet
      // Returns full config objects (with boardId) for Add New functionality
      const getAuthorizedInternalBoardConfigs = () => {
        console.log('=== getAuthorizedInternalBoardConfigs ===');
        console.log('internalBoardNames:', internalBoardNames);

        if (!internalBoardNames || internalBoardNames.length === 0) {
          console.log('No internal board configs, returning []');
          return [];
        }
        if (!authorization.mondayBoards || authorization.mondayBoards.length === 0) {
          // Backward compatibility: show all boards if no permissions defined
          console.log('No mondayBoards permissions, returning all configs');
          return internalBoardNames;
        }
        // Filter boards where user has the required permission
        const authorizedBoards = internalBoardNames.filter(board => {
          if (typeof board === 'string') return true; // old format, allow
          if (!board.permission) return true; // no permission required
          const hasPermission = authorization.mondayBoards.includes(board.permission);
          console.log(`Board "${board.boardName}" permission "${board.permission}": ${hasPermission}`);
          return hasPermission;
        });
        console.log('Authorized board configs:', authorizedBoards);
        return authorizedBoards;
      };

      // Check if Marketing Activities main tab should be shown
      const isMarketingTabAuthorized = () => {
        // Only check boards that are visible subtabs: Marketing Calendar, 2026 Approvals, Activity Stats
        const marketingBoards = ['MarketingCalendar', '2026MarketingApprovals', 'Activity Stats'];
        if (!authorization.mondayBoards || authorization.mondayBoards.length === 0) {
          return true; // backward compatibility
        }
        return marketingBoards.some(board => authorization.mondayBoards.includes(board));
      };

      // Check if Partner Activities main tab should be shown
      const isPartnerTabAuthorized = () => {
        const partnerBoards = ['PartnerActivites', 'PartnerHealthHeatmap'];
        if (!authorization.mondayBoards || authorization.mondayBoards.length === 0) {
          return true; // backward compatibility
        }
        return partnerBoards.some(board => authorization.mondayBoards.includes(board));
      };

      // Get count for Marketing Activities (sum of visible marketing subtabs)
      const getMarketingCount = () => {
        return filteredCalendarData.length + filteredApprovals2026Data.length;
        // Note: Activity Stats doesn't have a count
      };

      // Get count for Partner Activities (sum of all partner subtabs)
      const getPartnerCount = () => {
        return filteredPartnerActivitiesData.length + filteredPartnerHeatmapData.length;
      };

      // Render view mode filter buttons based on role
      const renderViewModeButtons = () => {
        const role = authorization.role;
        console.log('renderViewModeButtons - role:', role, 'authorization:', authorization);

        // User role: no buttons (always self view)
        if (role === 'User') {
          console.log('Role is User - not showing buttons');
          return null;
        }

        // Manager role: Self and Team buttons
        if (role === 'Manager') {
          return (
            <div className="btn-group btn-group-sm me-3" role="group" aria-label="View mode">
              <button
                type="button"
                className={`btn ${viewMode === 'self' ? 'btn-primary' : 'btn-outline-light'}`}
                onClick={() => setViewMode('self')}
              >
                Self
              </button>
              <button
                type="button"
                className={`btn ${viewMode === 'team' ? 'btn-primary' : 'btn-outline-light'}`}
                onClick={() => setViewMode('team')}
              >
                Team
              </button>
            </div>
          );
        }

        // SrDirector role: Self, Team, and Dept buttons
        if (role === 'SrDirector') {
          return (
            <div className="btn-group btn-group-sm me-3" role="group" aria-label="View mode">
              <button
                type="button"
                className={`btn ${viewMode === 'self' ? 'btn-primary' : 'btn-outline-light'}`}
                onClick={() => setViewMode('self')}
              >
                Self
              </button>
              <button
                type="button"
                className={`btn ${viewMode === 'team' ? 'btn-primary' : 'btn-outline-light'}`}
                onClick={() => setViewMode('team')}
              >
                Team
              </button>
              <button
                type="button"
                className={`btn ${viewMode === 'dept' ? 'btn-primary' : 'btn-outline-light'}`}
                onClick={() => setViewMode('dept')}
              >
                Dept
              </button>
            </div>
          );
        }

        // Admin role: Self and Dept buttons
        if (role === 'Admin') {
          return (
            <div className="btn-group btn-group-sm me-3" role="group" aria-label="View mode">
              <button
                type="button"
                className={`btn ${viewMode === 'self' ? 'btn-primary' : 'btn-outline-light'}`}
                onClick={() => setViewMode('self')}
              >
                Self
              </button>
              <button
                type="button"
                className={`btn ${viewMode === 'dept' ? 'btn-primary' : 'btn-outline-light'}`}
                onClick={() => setViewMode('dept')}
              >
                Dept
              </button>
            </div>
          );
        }

        return null;
      };

      // Show loading state while authorization is being fetched
      if (authLoading) {
        return (
          <div className="app-container">
            <div className="header">
              <div className="d-flex justify-content-between align-items-center">
                <h1>Activity Management Portal</h1>
              </div>
            </div>
            <div className="main-content d-flex justify-content-center align-items-center" style={{ minHeight: '50vh' }}>
              <div className="text-center">
                <div className="spinner-border text-primary mb-3" role="status">
                  <span className="visually-hidden">Loading...</span>
                </div>
                <p className="text-muted">Loading authorization...</p>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="app-container">
          {/* Header */}
          <div className="header">
            <div className="d-flex justify-content-between align-items-center">
              <h1>Activity Management Portal</h1>
              <div className="d-flex align-items-center gap-3">
                {/* View Mode Buttons */}
                {renderViewModeButtons()}
                <span className="text-white small">
                  {authorization.managerName || currentManager}
                </span>
                <div className="d-flex align-items-center gap-2">
                  {syncStatus.inProgress && (
                    <span className="badge bg-warning text-dark">
                      <span className="spinner-border spinner-border-sm me-1" role="status"></span>
                      Syncing...
                    </span>
                  )}
                  {syncStatus.message && !syncStatus.inProgress && (
                    <span className="text-white small" title={syncStatus.message}>
                      {syncStatus.lastCompletedSecondsAgo !== null && syncStatus.lastCompletedSecondsAgo < 120
                        ? `Synced ${syncStatus.lastCompletedSecondsAgo}s ago`
                        : ''}
                    </span>
                  )}
                  <button
                    className="btn btn-light btn-sm"
                    onClick={() => refreshFromMonday(false)}
                    disabled={loading || syncStatus.inProgress}
                    title={syncStatus.inProgress ? 'Sync in progress...' : 'Refresh data from Monday.com'}
                  >
                    {loading ? 'Loading...' : syncStatus.inProgress ? 'Syncing...' : 'Refresh Data'}
                  </button>
                </div>
              </div>
            </div>
          </div>

          {/* Main Content */}
          <div className="main-content">
            {error && (
              <div className="alert alert-danger" role="alert">
                {error}
              </div>
            )}

            {/* Main Tabs - 3 primary tabs */}
            <ul className="nav nav-tabs" style={{ flexWrap: 'wrap' }}>
              {isMarketingTabAuthorized() && (
                <li className="nav-item">
                  <button
                    className={`nav-link ${activeMainTab === 'marketing' ? 'active' : ''}`}
                    onClick={() => setActiveMainTab('marketing')}
                  >
                    Marketing Activities ({getMarketingCount()})
                  </button>
                </li>
              )}
              {isPartnerTabAuthorized() && (
                <li className="nav-item">
                  <button
                    className={`nav-link ${activeMainTab === 'partner' ? 'active' : ''}`}
                    onClick={() => setActiveMainTab('partner')}
                  >
                    Partner Activities ({getPartnerCount()})
                  </button>
                </li>
              )}
              {isAnyInternalBoardAuthorized() && (
                <li className="nav-item">
                  <button
                    className={`nav-link ${activeMainTab === 'internal' ? 'active' : ''}`}
                    onClick={() => setActiveMainTab('internal')}
                  >
                    Internal Activities ({filteredInternalActivitiesData.length})
                  </button>
                </li>
              )}
            </ul>

            {/* Tab Content */}
            {loading ? (
              <div className="loading-spinner">
                <div className="spinner-border text-primary" role="status">
                  <span className="visually-hidden">Loading...</span>
                </div>
              </div>
            ) : (
              <div className="tab-content-container">
                {/* Marketing Activities Main Tab */}
                {activeMainTab === 'marketing' && isMarketingTabAuthorized() && (
                  <div style={{ display: 'flex', flex: 1, minHeight: 0 }}>
                    {/* Vertical Subtabs on Left */}
                    <div className="nav flex-column" style={{ minWidth: '180px', borderRight: '1px solid #dee2e6', paddingRight: '0.5rem', marginRight: '1rem' }}>
                      {isBoardAuthorized('MarketingCalendar') && (
                        <button
                          onClick={() => setMarketingSubTab('calendar')}
                          type="button"
                          className="text-start mb-1"
                          style={{
                            backgroundColor: marketingSubTab === 'calendar' ? '#00739d' : 'transparent',
                            color: marketingSubTab === 'calendar' ? 'white' : '#00739d',
                            fontWeight: marketingSubTab === 'calendar' ? '600' : '400',
                            border: marketingSubTab === 'calendar' ? '1px solid #00739d' : '1px solid #dee2e6',
                            borderRadius: '4px',
                            padding: '8px 12px',
                            cursor: 'pointer',
                            fontSize: '0.85rem',
                            transition: 'all 0.15s ease-in-out'
                          }}
                        >
                          Marketing Calendar ({filteredCalendarData.length})
                        </button>
                      )}
                      {isBoardAuthorized('2026MarketingApprovals') && (
                        <button
                          onClick={() => setMarketingSubTab('approvals2026')}
                          type="button"
                          className="text-start mb-1"
                          style={{
                            backgroundColor: marketingSubTab === 'approvals2026' ? '#00739d' : 'transparent',
                            color: marketingSubTab === 'approvals2026' ? 'white' : '#00739d',
                            fontWeight: marketingSubTab === 'approvals2026' ? '600' : '400',
                            border: marketingSubTab === 'approvals2026' ? '1px solid #00739d' : '1px solid #dee2e6',
                            borderRadius: '4px',
                            padding: '8px 12px',
                            cursor: 'pointer',
                            fontSize: '0.85rem',
                            transition: 'all 0.15s ease-in-out'
                          }}
                        >
                          2026 Approvals ({filteredApprovals2026Data.length})
                        </button>
                      )}
                      {isBoardAuthorized('Activity Stats') && (
                        <button
                          onClick={() => setMarketingSubTab('stats')}
                          type="button"
                          className="text-start mb-1"
                          style={{
                            backgroundColor: marketingSubTab === 'stats' ? '#00739d' : 'transparent',
                            color: marketingSubTab === 'stats' ? 'white' : '#00739d',
                            fontWeight: marketingSubTab === 'stats' ? '600' : '400',
                            border: marketingSubTab === 'stats' ? '1px solid #00739d' : '1px solid #dee2e6',
                            borderRadius: '4px',
                            padding: '8px 12px',
                            cursor: 'pointer',
                            fontSize: '0.85rem',
                            transition: 'all 0.15s ease-in-out'
                          }}
                        >
                          Activity Stats
                        </button>
                      )}
                    </div>
                    {/* Marketing Subtab Content */}
                    <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column' }}>
                      {marketingSubTab === 'calendar' && isBoardAuthorized('MarketingCalendar') && (
                        <MarketingCalendarTab
                          data={filteredCalendarData}
                          filterOptions={filterOptions.calendarFilters || {}}
                          columns={calendarColumns}
                          onRefresh={loadData}
                          autoEditItemId={String(editBoardIdFromUrl) === MARKETING_CALENDAR_BOARD_ID ? autoEditItemId : null}
                          onAutoEditHandled={handleAutoEditHandled}
                          partnerNamesFromSheet={partnerNamesFromSheet}
                        />
                      )}
                      {marketingSubTab === 'approvals2026' && isBoardAuthorized('2026MarketingApprovals') && (
                        <Approvals2026Tab
                          data={filteredApprovals2026Data}
                          filterOptions={filterOptions.approvals2026Filters || {}}
                          columns={approvals2026Columns}
                          flowConfig={flowConfig2026}
                          onRefresh={loadData}
                          autoEditItemId={String(editBoardIdFromUrl) === APPROVALS_2026_BOARD_ID ? autoEditItemId : null}
                          onAutoEditHandled={handleAutoEditHandled}
                          partnerNamesFromSheet={partnerNamesFromSheet}
                        />
                      )}
                      {marketingSubTab === 'stats' && isBoardAuthorized('Activity Stats') && (
                        <MarketingStatsTab
                          chartData={chartData}
                          onRefresh={loadData}
                        />
                      )}
                    </div>
                  </div>
                )}

                {/* Partner Activities Main Tab */}
                {activeMainTab === 'partner' && isPartnerTabAuthorized() && (
                  <div style={{ display: 'flex', flex: 1, minHeight: 0 }}>
                    {/* Vertical Subtabs on Left */}
                    <div className="nav flex-column" style={{ minWidth: '180px', borderRight: '1px solid #dee2e6', paddingRight: '0.5rem', marginRight: '1rem' }}>
                      {isBoardAuthorized('PartnerActivites') && (
                        <button
                          onClick={() => setPartnerSubTab('tasksDueNow')}
                          type="button"
                          className="text-start mb-1"
                          style={{
                            backgroundColor: partnerSubTab === 'tasksDueNow' ? '#00739d' : 'transparent',
                            color: partnerSubTab === 'tasksDueNow' ? 'white' : '#00739d',
                            fontWeight: partnerSubTab === 'tasksDueNow' ? '600' : '400',
                            border: partnerSubTab === 'tasksDueNow' ? '1px solid #00739d' : '1px solid #dee2e6',
                            borderRadius: '4px',
                            padding: '8px 12px',
                            cursor: 'pointer',
                            fontSize: '0.85rem',
                            transition: 'all 0.15s ease-in-out'
                          }}
                        >
                          Tasks Due Now ({tasksDueNowCount})
                        </button>
                      )}
                      {isBoardAuthorized('PartnerActivites') && (
                        <button
                          onClick={() => setPartnerSubTab('partnerActivities')}
                          type="button"
                          className="text-start mb-1"
                          style={{
                            backgroundColor: partnerSubTab === 'partnerActivities' ? '#00739d' : 'transparent',
                            color: partnerSubTab === 'partnerActivities' ? 'white' : '#00739d',
                            fontWeight: partnerSubTab === 'partnerActivities' ? '600' : '400',
                            border: partnerSubTab === 'partnerActivities' ? '1px solid #00739d' : '1px solid #dee2e6',
                            borderRadius: '4px',
                            padding: '8px 12px',
                            cursor: 'pointer',
                            fontSize: '0.85rem',
                            transition: 'all 0.15s ease-in-out'
                          }}
                        >
                          Partner Activities ({filteredPartnerActivitiesData.length})
                        </button>
                      )}
                      {isBoardAuthorized('PartnerHealthHeatmap') && (
                        <button
                          onClick={() => setPartnerSubTab('heatmap')}
                          type="button"
                          className="text-start mb-1"
                          style={{
                            backgroundColor: partnerSubTab === 'heatmap' ? '#00739d' : 'transparent',
                            color: partnerSubTab === 'heatmap' ? 'white' : '#00739d',
                            fontWeight: partnerSubTab === 'heatmap' ? '600' : '400',
                            border: partnerSubTab === 'heatmap' ? '1px solid #00739d' : '1px solid #dee2e6',
                            borderRadius: '4px',
                            padding: '8px 12px',
                            cursor: 'pointer',
                            fontSize: '0.85rem',
                            transition: 'all 0.15s ease-in-out'
                          }}
                        >
                          Partner Heatmap ({filteredPartnerHeatmapData.length})
                        </button>
                      )}
                    </div>
                    {/* Partner Subtab Content */}
                    <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column' }}>
                      {partnerSubTab === 'tasksDueNow' && isBoardAuthorized('PartnerActivites') && (
                        <TasksDueNowTab
                          data={filteredPartnerActivitiesData}
                          onRefresh={loadData}
                        />
                      )}
                      {partnerSubTab === 'partnerActivities' && isBoardAuthorized('PartnerActivites') && (
                        <PartnerActivitiesTab
                          data={filteredPartnerActivitiesData}
                          onRefresh={loadData}
                        />
                      )}
                      {partnerSubTab === 'heatmap' && isBoardAuthorized('PartnerHealthHeatmap') && (
                        <PartnerHeatmapTab
                          data={filteredPartnerHeatmapData}
                          onRefresh={loadData}
                        />
                      )}
                    </div>
                  </div>
                )}

                {/* Internal Activities Main Tab - uses existing component with built-in subtabs */}
                {activeMainTab === 'internal' && isAnyInternalBoardAuthorized() && (
                  <InternalActivitiesTab
                    data={filteredInternalActivitiesData}
                    boardConfigs={getAuthorizedInternalBoardConfigs()}
                    onRefresh={loadData}
                  />
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // Render the app
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
