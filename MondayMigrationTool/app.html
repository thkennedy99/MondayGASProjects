<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef, createContext, useContext } = React;

// ── API Wrapper ──────────────────────────────────────────────────────────────

const api = {
  call: (functionName, ...args) => {
    return new Promise((resolve, reject) => {
      if (google?.script?.run) {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(err => reject(new Error(err?.message || err)))
          [functionName](...args);
      } else {
        console.log(`Mock call → ${functionName}`, args);
        setTimeout(() => resolve({ success: true, mock: true, data: {} }), 500);
      }
    });
  },
  // Fire-and-forget: calls the server function without waiting for a result.
  // Errors are logged but not thrown. Used for long-running operations.
  fireAndForget: (functionName, ...args) => {
    if (google?.script?.run) {
      google.script.run
        .withSuccessHandler(() => {})
        .withFailureHandler(err => console.error(`Fire-and-forget error in ${functionName}:`, err))
        [functionName](...args);
    } else {
      console.log(`Mock fire-and-forget → ${functionName}`, args);
    }
  }
};

// ── Toast System ─────────────────────────────────────────────────────────────

const ToastContext = createContext(null);
const useToast = () => useContext(ToastContext);

const ToastProvider = ({ children }) => {
  const [toasts, setToasts] = useState([]);

  const show = useCallback((msg, type = 'info', delay = 4000) => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    if (delay > 0) setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), delay);
  }, []);

  const remove = useCallback(id => setToasts(t => t.filter(x => x.id !== id)), []);

  return (
    <ToastContext.Provider value={{ show, remove }}>
      {children}
      {ReactDOM.createPortal(
        <div className="toast-container position-fixed bottom-0 end-0 p-3">
          {toasts.map(t => (
            <div key={t.id} className={`toast show bg-${t.type === 'danger' ? 'danger' : t.type === 'success' ? 'success' : 'info'} text-white`} role="alert">
              <div className="toast-body d-flex justify-content-between align-items-center">
                <span>{t.msg}</span>
                <button type="button" className="btn-close btn-close-white ms-2" onClick={() => remove(t.id)} />
              </div>
            </div>
          ))}
        </div>,
        document.getElementById('toast-root')
      )}
    </ToastContext.Provider>
  );
};

// ── Theme Hook ───────────────────────────────────────────────────────────────

const useTheme = () => {
  const [theme, setTheme] = useState(() => {
    return localStorage.getItem('mig-theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  });

  useEffect(() => {
    document.documentElement.setAttribute('data-bs-theme', theme);
    localStorage.setItem('mig-theme', theme);
  }, [theme]);

  const toggle = () => setTheme(t => t === 'light' ? 'dark' : 'light');
  return { theme, toggle };
};

// ── Reusable Components ──────────────────────────────────────────────────────

const StatCard = ({ value, label, icon, color }) => (
  <div className="card stat-card h-100">
    <div className="card-body">
      {icon && <i className={`bi bi-${icon} d-block mb-2`} style={{ fontSize: '1.5rem', color: color || 'var(--gw-guidewire-blue)' }} />}
      <div className="stat-value" style={color ? { color } : {}}>{value}</div>
      <div className="stat-label">{label}</div>
    </div>
  </div>
);

const MatchRing = ({ percent, size }) => {
  const cls = percent >= 90 ? 'great' : percent >= 70 ? 'good' : 'poor';
  const sz = size || 100;
  return (
    <div className={`match-ring ${cls}`} style={{ width: sz, height: sz, fontSize: sz * 0.22 }}>
      {percent}%
    </div>
  );
};

const LoadingSpinner = ({ message }) => (
  <div className="text-center py-5">
    <div className="spinner-border text-primary mb-3" role="status" style={{ width: '3rem', height: '3rem' }}>
      <span className="visually-hidden">Loading...</span>
    </div>
    <p className="text-muted">{message || 'Loading...'}</p>
  </div>
);

const EmptyState = ({ icon, title, subtitle }) => (
  <div className="empty-state">
    <i className={`bi bi-${icon || 'inbox'}`} />
    <h5>{title}</h5>
    {subtitle && <p className="text-muted">{subtitle}</p>}
  </div>
);

// ── Inventory Tab ────────────────────────────────────────────────────────────

const InventoryTab = () => {
  const toast = useToast();
  const [loading, setLoading] = useState(false);
  const [inventory, setInventory] = useState(null);
  const [selectedWs, setSelectedWs] = useState(null);
  const [wsDetail, setWsDetail] = useState(null);
  const [wsLoading, setWsLoading] = useState(false);
  const [userInv, setUserInv] = useState(null);
  const [showUsers, setShowUsers] = useState(false);

  const loadInventory = async () => {
    setLoading(true);
    try {
      const result = await api.call('getAccountInventory');
      if (result.success) {
        setInventory(result.data);
      } else {
        toast.show(result.error || 'Failed to load inventory', 'danger');
      }
    } catch (e) {
      toast.show(e.message, 'danger');
    }
    setLoading(false);
  };

  // Auto-load full inventory on mount if we have pre-fetched workspaces
  useEffect(() => {
    if (window.initialWorkspaces && window.initialWorkspaces.length > 0) {
      loadInventory();
    }
  }, []);

  const loadWorkspace = async (wsId) => {
    setSelectedWs(wsId);
    setWsDetail(null);
    setWsLoading(true);
    try {
      const result = await api.call('getWorkspaceInventory', wsId);
      if (result.success) {
        setWsDetail(result.data);
      } else {
        toast.show(result.error || 'Failed to load workspace', 'danger');
      }
    } catch (e) {
      toast.show(e.message, 'danger');
    }
    setWsLoading(false);
  };

  const loadUsers = async () => {
    setShowUsers(true);
    if (userInv) return;
    try {
      const result = await api.call('getUserInventory');
      if (result.success) setUserInv(result.data);
    } catch (e) {
      toast.show(e.message, 'danger');
    }
  };

  return (
    <div>
      <div className="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h4 className="mb-1"><i className="bi bi-clipboard-data me-2" />Account Inventory</h4>
          <p className="text-muted mb-0">Scan your Monday.com account to see all workspaces, boards, and users.</p>
        </div>
        <div className="d-flex gap-2">
          <button className="btn btn-gw-primary" onClick={loadInventory} disabled={loading}>
            {loading ? <><span className="spinner-border spinner-border-sm me-1" />Scanning...</> : <><i className="bi bi-arrow-clockwise me-1" />Scan Account</>}
          </button>
          <button className="btn btn-outline-secondary" onClick={loadUsers} disabled={!inventory}>
            <i className="bi bi-people me-1" />Users
          </button>
        </div>
      </div>

      {!inventory && !loading && (
        <EmptyState icon="search" title="No inventory loaded" subtitle="Click 'Scan Account' to get started." />
      )}

      {loading && <LoadingSpinner message="Scanning your Monday.com account..." />}

      {inventory && !loading && (
        <>
          <div className="row g-3 mb-4">
            <div className="col-md-3"><StatCard value={inventory.workspaceCount} label="Workspaces" icon="building" /></div>
            <div className="col-md-3"><StatCard value={inventory.users.total} label="Total Users" icon="people" /></div>
            <div className="col-md-3"><StatCard value={inventory.users.members} label="Members" icon="person-badge" color="var(--match-great)" /></div>
            <div className="col-md-3"><StatCard value={inventory.users.guests} label="Guests" icon="person-dash" color="var(--gw-orange)" /></div>
          </div>

          <div className="row">
            <div className="col-md-4">
              <div className="card">
                <div className="card-header"><i className="bi bi-building me-1" /> Workspaces</div>
                <div className="list-group list-group-flush scrollable-table" style={{ maxHeight: '500px' }}>
                  {[...inventory.workspaces].sort((a, b) => a.name.localeCompare(b.name)).map(ws => (
                    <button key={ws.id}
                      className={`list-group-item list-group-item-action workspace-card ${selectedWs === ws.id ? 'selected' : ''}`}
                      onClick={() => loadWorkspace(ws.id)}>
                      <div className="d-flex justify-content-between align-items-center">
                        <div>
                          <strong>{ws.name}</strong>
                          <br /><small className="text-muted">{ws.kind}</small>
                        </div>
                        <i className="bi bi-chevron-right" />
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            </div>

            <div className="col-md-8">
              {wsLoading && <LoadingSpinner message="Loading workspace details..." />}

              {!wsLoading && !wsDetail && (
                <EmptyState icon="arrow-left" title="Select a workspace" subtitle="Click a workspace to see its boards." />
              )}

              {wsDetail && !wsLoading && (
                <div className="card">
                  <div className="card-header d-flex justify-content-between">
                    <span><i className="bi bi-kanban me-1" /> Boards in Workspace</span>
                    <span className="badge bg-primary">{wsDetail.summary.boardCount} boards</span>
                  </div>
                  <div className="card-body">
                    <div className="row g-2 mb-3">
                      <div className="col-4"><StatCard value={wsDetail.summary.totalItems} label="Items" icon="list-task" /></div>
                      <div className="col-4"><StatCard value={wsDetail.summary.totalGroups} label="Groups" icon="collection" /></div>
                      <div className="col-4"><StatCard value={wsDetail.summary.totalColumns} label="Columns" icon="layout-three-columns" /></div>
                    </div>
                    <div className="scrollable-table">
                      <table className="table table-gw table-sm mb-0">
                        <thead><tr><th>Board Name</th><th>Kind</th><th>Groups</th><th>Columns</th><th>Items</th></tr></thead>
                        <tbody>
                          {wsDetail.boards.map(b => (
                            <tr key={b.id}>
                              <td><strong>{b.name}</strong></td>
                              <td><span className="badge bg-secondary">{b.kind}</span></td>
                              <td>{b.groupCount}</td>
                              <td>{b.columnCount}</td>
                              <td><strong>{b.itemCount}</strong></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>

          {showUsers && userInv && (
            <div className="card mt-4">
              <div className="card-header d-flex justify-content-between">
                <span><i className="bi bi-people me-1" /> Account Users</span>
                <button className="btn btn-sm btn-outline-secondary" onClick={() => setShowUsers(false)}>
                  <i className="bi bi-x" /> Close
                </button>
              </div>
              <div className="card-body">
                <div className="row g-2 mb-3">
                  <div className="col-3"><StatCard value={userInv.summary.total} label="Total" /></div>
                  <div className="col-3"><StatCard value={userInv.summary.members} label="Members" color="var(--match-great)" /></div>
                  <div className="col-3"><StatCard value={userInv.summary.guests} label="Guests" color="var(--gw-orange)" /></div>
                  <div className="col-3"><StatCard value={userInv.summary.disabled} label="Disabled" color="var(--match-poor)" /></div>
                </div>
                <div className="scrollable-table" style={{ maxHeight: '300px' }}>
                  <table className="table table-gw table-sm mb-0">
                    <thead><tr><th>Name</th><th>Email</th><th>Type</th><th>Status</th></tr></thead>
                    <tbody>
                      {userInv.users.map(u => (
                        <tr key={u.id}>
                          <td>{u.name}</td>
                          <td><small>{u.email}</small></td>
                          <td><span className={`badge ${u.isGuest ? 'bg-warning text-dark' : 'bg-info text-white'}`}>{u.isGuest ? 'Guest' : 'Member'}</span></td>
                          <td><span className={`badge ${u.enabled ? 'bg-success' : 'bg-danger'}`}>{u.enabled ? 'Active' : 'Disabled'}</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
};

// ── Target Account Selector (shared between Test Run & Migration) ───────────

const TargetAccountSelector = ({ selectedAccountId, onAccountChange, label }) => {
  const toast = useToast();
  const [accounts, setAccounts] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => { loadAccounts(); }, []);

  const loadAccounts = async () => {
    setLoading(true);
    try {
      const result = await api.call('getTargetAccounts');
      if (result.success) setAccounts(result.accounts || []);
    } catch (e) { console.warn('Failed to load target accounts'); }
    setLoading(false);
  };

  const sourceAccount = accounts.find(a => a.role === 'source');
  const selectedAccount = accounts.find(a => a.accountId === selectedAccountId);
  const isCrossAccount = selectedAccount && sourceAccount && selectedAccount.accountId !== sourceAccount.accountId;

  return (
    <div className="card">
      <div className="card-header">
        <i className="bi bi-box-arrow-in-right me-1" /> {label || 'Destination Monday.com Account'}
        {isCrossAccount && <span className="badge bg-warning text-dark ms-2">Cross-Account</span>}
        {!selectedAccountId && <span className="badge bg-secondary ms-2">Not Selected</span>}
        {selectedAccountId && !isCrossAccount && <span className="badge bg-info text-dark ms-2">Same Account</span>}
      </div>
      <div className="card-body">
        {loading ? (
          <div className="text-center py-2">
            <span className="spinner-border spinner-border-sm me-2" />Loading accounts...
          </div>
        ) : accounts.length === 0 ? (
          <div className="alert alert-warning mb-0">
            <i className="bi bi-exclamation-triangle me-1" />
            No Monday.com accounts configured. Set <code>MONDAY_API_KEY</code> and/or <code>MONDAY_MIGRATION_API_KEY</code> in Script Properties.
          </div>
        ) : (
          <>
            <select className="form-select" value={selectedAccountId || ''} onChange={e => onAccountChange(e.target.value)}>
              <option value="">Select destination platform...</option>
              {accounts.map(a => (
                <option key={a.accountId} value={a.accountId}>
                  {a.displayLabel || a.accountName}{a.role === 'source' ? ' (source)' : ' (migration target)'}
                </option>
              ))}
            </select>

            {selectedAccount && (
              <div className="alert alert-success mt-3 mb-0 d-flex align-items-center">
                <div>
                  <strong><i className="bi bi-check-circle me-1" />Destination:</strong>{' '}
                  {selectedAccount.displayLabel || selectedAccount.accountName}
                  <br /><small className="text-muted">Account ID: {selectedAccount.accountId} &middot; {selectedAccount.role === 'source' ? 'Source platform' : 'Migration target platform'}</small>
                </div>
              </div>
            )}

            {isCrossAccount && (
              <div className="alert alert-warning mt-3 mb-0">
                <i className="bi bi-exclamation-triangle me-1" />
                <strong>Cross-account notes:</strong>
                <ul className="mb-0 mt-1">
                  <li>People columns will be <strong>skipped</strong> (user IDs differ between accounts)</li>
                  <li>Enable <strong>Managed Templates</strong> to preserve automations/webhooks via <code>use_template</code></li>
                  <li>Users & guests should be assigned separately via the <strong>Users & Guests</strong> tab after migration</li>
                </ul>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
};

// ── Shared Component Selector ────────────────────────────────────────────────

const ComponentSelector = ({ components, componentDefs, toggleComponent }) => (
  <div className="card">
    <div className="card-header"><i className="bi bi-gear me-1" /> Migration Components</div>
    <div className="card-body">
      {componentDefs && Object.keys(componentDefs).map(key => {
        const comp = componentDefs[key];
        const isMandatory = comp.mandatory;
        const isChecked = isMandatory || components[key];

        return (
          <div key={key} className="form-check mb-2">
            <input className="form-check-input" type="checkbox" id={`comp-${key}`}
              checked={isChecked} disabled={isMandatory}
              onChange={() => !isMandatory && toggleComponent(key)} />
            <label className="form-check-label" htmlFor={`comp-${key}`}>
              <strong>{comp.label}</strong>
              {isMandatory && <span className="badge bg-secondary ms-2">Required</span>}
              <br /><small className="text-muted">{comp.description}</small>
            </label>
          </div>
        );
      })}

      {!componentDefs && (
        <>
          <div className="form-check mb-2"><input className="form-check-input" type="checkbox" checked disabled /><label className="form-check-label"><strong>Boards</strong> <span className="badge bg-secondary ms-1">Required</span></label></div>
          <div className="form-check mb-2"><input className="form-check-input" type="checkbox" checked disabled /><label className="form-check-label"><strong>Columns</strong> <span className="badge bg-secondary ms-1">Required</span></label></div>
          <div className="form-check mb-2"><input className="form-check-input" type="checkbox" checked disabled /><label className="form-check-label"><strong>Items</strong> <span className="badge bg-secondary ms-1">Required</span></label></div>
          {Object.entries(components).map(([key, val]) => (
            <div key={key} className="form-check mb-2">
              <input className="form-check-input" type="checkbox" checked={val} onChange={() => toggleComponent(key)} />
              <label className="form-check-label"><strong>{key.charAt(0).toUpperCase() + key.slice(1)}</strong></label>
            </div>
          ))}
        </>
      )}
    </div>
  </div>
);

// ── Dry Run Results Display ─────────────────────────────────────────────────

const DryRunResults = ({ result }) => {
  if (!result) return null;

  return (
    <div className="card mb-4">
      <div className="card-header bg-info text-white">
        <i className="bi bi-clipboard-check me-1" /> Analysis Results — {result.sourceWorkspace.name}
      </div>
      <div className="card-body">
        <div className="row g-3 mb-4">
          <div className="col"><StatCard value={result.totals.boards} label="Boards" icon="kanban" /></div>
          <div className="col"><StatCard value={result.totals.groups} label="Groups" icon="collection" /></div>
          <div className="col"><StatCard value={result.totals.columns} label="Columns" icon="layout-three-columns" /></div>
          <div className="col"><StatCard value={result.totals.items} label="Items" icon="list-task" /></div>
          <div className="col"><StatCard value={result.totals.documents || 0} label="Documents" icon="file-earmark-text" /></div>
          <div className="col"><StatCard value={result.estimatedApiCalls} label="API Calls" icon="cloud" /></div>
        </div>

        <div className="row g-3 mb-3">
          <div className="col-md-6">
            <p className="mb-1"><strong>Estimated Duration:</strong> {result.estimatedDuration}</p>
          </div>
        </div>

        {/* Document Analysis */}
        {result.documentAnalysis && result.documentAnalysis.totalCount > 0 && (
          <div className="alert alert-primary mb-3">
            <strong><i className="bi bi-file-earmark-text me-1" />Document Migration:</strong>{' '}
            {result.documentAnalysis.exportableCount} of {result.documentAnalysis.totalCount} document(s) will be exported as markdown,
            backed up to Google Drive, and recreated in the target workspace.
            {result.documentAnalysis.totalMarkdownSize > 0 && (
              <span> (~{Math.round(result.documentAnalysis.totalMarkdownSize / 1024)} KB total)</span>
            )}
            {result.documentAnalysis.emptyCount > 0 && (
              <span> {result.documentAnalysis.emptyCount} empty doc(s) will be created without content.</span>
            )}
            {result.documentAnalysis.docs.length > 0 && (
              <ul className="mb-0 mt-2">
                {result.documentAnalysis.docs.map((d, i) => (
                  <li key={i}>
                    <strong>{d.name}</strong>
                    {d.exportable ? (
                      <span className="text-success ms-1">
                        <i className="bi bi-check-circle" /> {d.markdownSize > 0 ? `(${Math.round(d.markdownSize / 1024)} KB)` : '(empty)'}
                      </span>
                    ) : (
                      <span className="text-danger ms-1"><i className="bi bi-x-circle" /> {d.error || 'Cannot export'}</span>
                    )}
                  </li>
                ))}
              </ul>
            )}
          </div>
        )}

        {/* Template Clone Info */}
        {result.useTemplates && (
          <div className="alert alert-success mb-3">
            <strong><i className="bi bi-copy me-1" />Template Clone:</strong>{' '}
            Boards will be duplicated via <code>duplicate_board</code>, preserving views, automations, formulas,
            and managed column links automatically. Only item data will be migrated separately.
            {result.boards.some(b => b.complexColumns && b.complexColumns.length > 0) && (
              <ul className="mb-0 mt-2">
                {result.boards.filter(b => b.complexColumns && b.complexColumns.length > 0).map((b, i) => (
                  <li key={i}>
                    <strong>{b.name}</strong>: {b.complexColumns.map(c => `${c.title} (${c.type})`).join(', ')} — preserved via template clone
                  </li>
                ))}
              </ul>
            )}
          </div>
        )}

        {result.managedColumns && result.managedColumns.detectedOnBoards > 0 && (
          <div className="alert alert-primary mb-3">
            <strong><i className="bi bi-link-45deg me-1" />Managed Columns:</strong>{' '}
            {result.managedColumns.detectedOnBoards} managed column link(s) detected
            ({result.managedColumns.accountTotal} total in account).
            These will be <em>attached</em> to target boards to preserve account-level consistency.
            {result.managedColumns.matches.length > 0 && (
              <ul className="mb-0 mt-2">
                {result.managedColumns.matches.map((m, i) => (
                  <li key={i}>
                    <strong>{m.boardName}</strong> &rarr; "{m.columnTitle}" linked to managed column "{m.managedColumnTitle}" ({m.matchRate}% match)
                  </li>
                ))}
              </ul>
            )}
          </div>
        )}

        {result.notes.length > 0 && (
          <div className="alert alert-info mb-3">
            <strong><i className="bi bi-info-circle me-1" />Notes:</strong>
            <ul className="mb-0 mt-1">
              {result.notes.map((n, i) => <li key={i}>{n}</li>)}
            </ul>
          </div>
        )}

        {result.warnings.length > 0 && (
          <div className="alert alert-warning mb-3">
            <strong><i className="bi bi-exclamation-triangle me-1" />Warnings:</strong>
            <ul className="mb-0 mt-1">
              {result.warnings.map((w, i) => <li key={i}>{w}</li>)}
            </ul>
          </div>
        )}

        <h6>Board Details</h6>
        <div className="scrollable-table">
          <table className="table table-gw table-sm mb-0">
            <thead><tr><th>Board</th><th>Kind</th><th>Groups</th><th>Columns</th><th>Items</th></tr></thead>
            <tbody>
              {result.boards.map(b => (
                <tr key={b.id}>
                  <td><strong>{b.name}</strong></td>
                  <td><span className="badge bg-secondary">{b.kind}</span></td>
                  <td>{b.groups}</td>
                  <td>{b.columns}</td>
                  <td><strong>{b.items}</strong></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

// ── Test Run Tab ────────────────────────────────────────────────────────────

const TestRunTab = () => {
  const toast = useToast();
  const [workspaces, setWorkspaces] = useState(window.initialWorkspaces || []);
  const [selectedWs, setSelectedWs] = useState('');
  const [selectedTargetAccount, setSelectedTargetAccount] = useState('');
  const [components, setComponents] = useState({
    groups: true,
    folders: true,
    useTemplates: true,
    managedColumns: true,
    documents: true
  });
  const [componentDefs, setComponentDefs] = useState(null);
  const [dryRunResult, setDryRunResult] = useState(null);
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    if (workspaces.length === 0) loadWorkspaces();
    loadComponentDefs();
  }, []);

  const loadWorkspaces = async () => {
    try {
      const result = await api.call('getAccountInventory');
      if (result.success) {
        const ws = (result.data.workspaces || []).sort((a, b) => a.name.localeCompare(b.name));
        setWorkspaces(ws);
      }
    } catch (e) { toast.show(e.message, 'danger'); }
  };

  const loadComponentDefs = async () => {
    try {
      const result = await api.call('getMigrationComponents');
      if (result.success) setComponentDefs(result.data);
    } catch (e) { console.warn('Failed to load component definitions'); }
  };

  const toggleComponent = (key) => {
    setComponents(prev => ({ ...prev, [key]: !prev[key] }));
  };

  const runDryRun = async () => {
    if (!selectedWs) { toast.show('Select a workspace first', 'warning'); return; }
    setLoading(true);
    setDryRunResult(null);
    try {
      const result = await api.call('testMigration', selectedWs, components);
      if (result.success) {
        setDryRunResult(result.data);
        toast.show('Analysis complete!', 'success');
      } else {
        toast.show(result.error || 'Test run failed', 'danger');
      }
    } catch (e) {
      toast.show(e.message, 'danger');
    }
    setLoading(false);
  };

  return (
    <div>
      <h4 className="mb-1"><i className="bi bi-search me-2" />Test Run (Dry Run)</h4>
      <p className="text-muted mb-4">Analyze a workspace to see what would be migrated without making any changes.</p>

      <div className="row g-4 mb-4">
        <div className="col-md-6">
          <div className="card">
            <div className="card-header"><i className="bi bi-building me-1" /> Source Workspace</div>
            <div className="card-body">
              <select className="form-select" value={selectedWs} onChange={e => setSelectedWs(e.target.value)}>
                <option value="">Select a workspace...</option>
                {workspaces.map(ws => (
                  <option key={ws.id} value={ws.id}>{ws.name} ({ws.kind})</option>
                ))}
              </select>
            </div>
          </div>
        </div>

        <div className="col-md-6">
          <ComponentSelector components={components} componentDefs={componentDefs} toggleComponent={toggleComponent} />
        </div>

        <div className="col-12">
          <TargetAccountSelector
            selectedAccountId={selectedTargetAccount}
            onAccountChange={setSelectedTargetAccount}
            label="Target Monday.com Account (Dry Run)"
          />
        </div>

        <div className="col-12 text-end">
          <button className="btn btn-gw-primary btn-lg" onClick={runDryRun} disabled={!selectedWs || loading}>
            {loading ? <><span className="spinner-border spinner-border-sm me-1" />Analyzing...</> : <><i className="bi bi-search me-1" />Run Analysis</>}
          </button>
        </div>
      </div>

      {loading && <LoadingSpinner message="Analyzing workspace..." />}

      {dryRunResult && !loading && <DryRunResults result={dryRunResult} />}
    </div>
  );
};

// ── Migration Tab ────────────────────────────────────────────────────────────

const MigrationTab = () => {
  const toast = useToast();
  const [workspaces, setWorkspaces] = useState(window.initialWorkspaces || []);
  const [selectedWs, setSelectedWs] = useState('');
  const [targetName, setTargetName] = useState('');
  const [components, setComponents] = useState({
    groups: true,
    folders: true,
    useTemplates: true,
    useManagedTemplates: false,
    managedColumns: true,
    documents: true
  });

  // Template management state
  const [templateStatus, setTemplateStatus] = useState(null);
  const [templateSets, setTemplateSets] = useState([]);
  const [templateLoading, setTemplateLoading] = useState(false);
  const [preparingTemplates, setPreparingTemplates] = useState(false);
  const [componentDefs, setComponentDefs] = useState(null);
  const [migrationId, setMigrationId] = useState(null);
  const [progress, setProgress] = useState(null);
  const [polling, setPolling] = useState(false);
  const [step, setStep] = useState('configure'); // configure | running | done
  const pollRef = useRef(null);
  const pollCountRef = useRef(0);

  // Target account state
  const [selectedTargetAccount, setSelectedTargetAccount] = useState('');

  // Board selector state
  const [boardSelectorOpen, setBoardSelectorOpen] = useState(false);
  const [availableBoards, setAvailableBoards] = useState([]);
  const [selectedBoardIds, setSelectedBoardIds] = useState([]);  // empty = all boards
  const [boardsLoading, setBoardsLoading] = useState(false);

  useEffect(() => {
    if (workspaces.length === 0) loadWorkspaces();
    loadComponentDefs();
    return () => { if (pollRef.current) clearTimeout(pollRef.current); };
  }, []);

  const loadWorkspaces = async () => {
    try {
      const result = await api.call('getAccountInventory');
      if (result.success) {
        const ws = (result.data.workspaces || []).sort((a, b) => a.name.localeCompare(b.name));
        setWorkspaces(ws);
      }
    } catch (e) { toast.show(e.message, 'danger'); }
  };

  const loadComponentDefs = async () => {
    try {
      const result = await api.call('getMigrationComponents');
      if (result.success) setComponentDefs(result.data);
    } catch (e) { console.warn('Failed to load component definitions'); }
  };

  const toggleComponent = (key) => {
    setComponents(prev => ({ ...prev, [key]: !prev[key] }));
  };

  const loadBoardsForWorkspace = async (wsId) => {
    if (!wsId) {
      setAvailableBoards([]);
      setSelectedBoardIds([]);
      setBoardSelectorOpen(false);
      return;
    }
    setBoardsLoading(true);
    try {
      const result = await api.call('getWorkspaceBoardsList', wsId);
      if (result.success) {
        setAvailableBoards(result.boards || []);
        setSelectedBoardIds([]); // reset — empty means all
      }
    } catch (e) {
      toast.show('Failed to load boards: ' + e.message, 'danger');
    } finally {
      setBoardsLoading(false);
    }
  };

  const handleWorkspaceChange = (wsId) => {
    setSelectedWs(wsId);
    loadBoardsForWorkspace(wsId);
    setTemplateStatus(null); // Reset template status when workspace changes
  };

  // Detect existing managed templates for boards in the selected workspace
  const detectTemplates = async () => {
    if (!selectedWs) return;
    setTemplateLoading(true);
    try {
      const result = await api.call('detectWorkspaceTemplates', selectedWs);
      if (result.success) {
        setTemplateStatus(result);
      } else {
        toast.show(result.error || 'Failed to detect templates', 'danger');
      }
    } catch (e) {
      toast.show('Template detection failed: ' + e.message, 'danger');
    }
    setTemplateLoading(false);
  };

  // Load template sets for cross-account scenarios
  const loadTemplateSets = async () => {
    try {
      const result = await api.call('getTemplateSetsForMigration', selectedWs, selectedTargetAccount);
      if (result.success) setTemplateSets(result.sets || []);
    } catch (e) { console.warn('Failed to load template sets:', e); }
  };

  // Prepare skeleton templates on target platform (cross-account)
  const prepareTemplatesOnTarget = async () => {
    if (!selectedWs || !selectedTargetAccount) {
      toast.show('Select a source workspace and target account first', 'warning');
      return;
    }
    setPreparingTemplates(true);
    try {
      const wsName = workspaces.find(w => w.id === selectedWs)?.name || 'Workspace';
      const params = {
        sourceWorkspaceId: selectedWs,
        targetAccountId: selectedTargetAccount,
        targetWorkspaceName: wsName + ' Templates',
        selectedBoardIds: boardSelectorOpen && selectedBoardIds.length > 0 ? selectedBoardIds : null,
        setName: wsName + ' Template Set'
      };
      const result = await api.call('initTemplatePreparation', params);
      if (result.success) {
        toast.show('Template boards created on target! Add automations/webhooks, then run migration.', 'success', 8000);
        loadTemplateSets(); // Refresh the list
      } else {
        toast.show(result.error || 'Failed to prepare templates', 'danger');
      }
    } catch (e) {
      toast.show('Template preparation failed: ' + e.message, 'danger');
    }
    setPreparingTemplates(false);
  };

  // Delete a template set
  const deleteTemplateSetHandler = async (setId) => {
    try {
      const result = await api.call('removeTemplateSet', setId);
      if (result.success) {
        toast.show('Template set removed', 'success');
        setTemplateSets(prev => prev.filter(s => s.id !== setId));
      }
    } catch (e) { toast.show('Failed to remove template set: ' + e.message, 'danger'); }
  };

  // When managed templates checkbox is toggled on, auto-detect
  useEffect(() => {
    if (components.useManagedTemplates && selectedWs) {
      detectTemplates();
      if (selectedTargetAccount) loadTemplateSets();
    }
  }, [components.useManagedTemplates, selectedWs, selectedTargetAccount]);

  const toggleBoardSelection = (boardId) => {
    setSelectedBoardIds(prev =>
      prev.includes(boardId) ? prev.filter(id => id !== boardId) : [...prev, boardId]
    );
  };

  const selectAllBoards = () => setSelectedBoardIds(availableBoards.map(b => b.id));
  const selectNoBoards = () => setSelectedBoardIds([]);

  const startMigration = async () => {
    if (!selectedTargetAccount) { toast.show('Select a destination platform before starting migration', 'warning'); return; }
    if (!selectedWs) { toast.show('Select a source workspace', 'warning'); return; }
    if (boardSelectorOpen && selectedBoardIds.length === 0) {
      toast.show('Select at least one board or close the board selector to migrate all', 'warning');
      return;
    }

    setStep('running');
    try {
      const wsName = targetName || (workspaces.find(w => w.id === selectedWs)?.name + ' (Migrated)');
      const params = {
        sourceWorkspaceId: selectedWs,
        targetWorkspaceName: wsName,
        components: components
      };
      if (selectedTargetAccount) {
        params.targetAccountId = selectedTargetAccount;
      }
      if (boardSelectorOpen && selectedBoardIds.length > 0) {
        params.selectedBoardIds = selectedBoardIds;
      }

      // Step 1: Initialize migration (returns immediately with migrationId)
      const initResult = await api.call('initMigration', params);
      if (!initResult.success) {
        toast.show(initResult.error || 'Failed to initialize migration', 'danger');
        setStep('configure');
        return;
      }

      const id = initResult.migrationId;
      setMigrationId(id);

      // Step 2: Start polling BEFORE firing the migration (so UI shows progress immediately)
      startPolling(id);

      // Step 3: Fire-and-forget the actual migration execution
      api.fireAndForget('runMigration', id);

      toast.show('Migration started!', 'success');
    } catch (e) {
      toast.show(e.message, 'danger');
      setStep('configure');
    }
  };

  const startPolling = (id) => {
    setPolling(true);
    pollCountRef.current = 0;

    const poll = async () => {
      try {
        const result = await api.call('getMigrationProgress', id);
        if (result.success && result.progress) {
          setProgress(result.progress);
          pollCountRef.current++;

          if (result.progress.state === 'completed' || result.progress.state === 'completed_with_errors' || result.progress.state === 'error' || result.progress.state === 'cancelled') {
            setPolling(false);
            setStep('done');
            // Refresh workspace list so new workspace appears in dropdowns
            refreshWorkspaces();
            return;
          }
        }
        const interval = 30000; // Poll every 30 seconds to avoid filling execution log
        pollRef.current = setTimeout(poll, interval);
      } catch (e) {
        console.error('Polling error:', e);
        setPolling(false);
      }
    };
    poll();
  };

  const handleCancel = async () => {
    // Stop polling immediately so no further updates overwrite our state
    if (pollRef.current) {
      clearTimeout(pollRef.current);
      pollRef.current = null;
    }
    setPolling(false);

    // Update UI immediately to show cancellation in progress
    setProgress(prev => ({
      ...prev,
      state: 'cancelling',
      message: 'Cancelling migration...'
    }));

    if (migrationId) {
      try {
        const result = await api.call('cancelMigration', migrationId);
        if (result.success) {
          toast.show('Migration cancelled successfully.', 'warning');
        } else {
          toast.show('Cancel request sent but server returned an error: ' + (result.error || 'unknown'), 'danger');
        }
      } catch (e) {
        toast.show('Cancel request sent. The migration will stop at the next checkpoint.', 'warning');
      }
    }

    // Transition to done state with cancelled progress
    setProgress(prev => ({
      ...prev,
      state: 'cancelled',
      message: 'Migration cancelled by user.'
    }));
    setStep('done');
  };

  const refreshWorkspaces = async () => {
    try {
      const result = await api.call('getAccountInventory');
      if (result.success) {
        const ws = (result.data.workspaces || []).sort((a, b) => a.name.localeCompare(b.name));
        setWorkspaces(ws);
        // Update global cache so other tabs pick up new workspaces
        window.initialWorkspaces = ws;
      }
    } catch (e) { console.warn('Failed to refresh workspaces:', e); }
  };

  const resetMigration = () => {
    setStep('configure');
    setMigrationId(null);
    setProgress(null);
    setSelectedWs('');
    setTargetName('');
    setAvailableBoards([]);
    setSelectedBoardIds([]);
    setBoardSelectorOpen(false);
    refreshWorkspaces();
  };

  const selectedWsName = workspaces.find(w => w.id === selectedWs)?.name || '';

  return (
    <div>
      <h4 className="mb-1"><i className="bi bi-arrow-left-right me-2" />Workspace Migration</h4>
      <p className="text-muted mb-4">Clone a workspace to a new workspace. Supports same-account and cross-account migration.</p>

      {/* Step Indicator */}
      <div className="d-flex mb-4 gap-2">
        {['configure', 'running', 'done'].map((s, i) => (
          <div key={s} className={`flex-fill text-center py-2 rounded ${step === s ? 'bg-primary text-white' : 'bg-light text-muted'}`}>
            <small><strong>{i + 1}.</strong> {s === 'configure' ? 'Configure' : s === 'running' ? 'Migrating' : 'Complete'}</small>
          </div>
        ))}
      </div>

      {/* Step 1: Configure */}
      {step === 'configure' && (
        <div className="row g-4">
          {/* Target Account — at the top */}
          <div className="col-12">
            <TargetAccountSelector
              selectedAccountId={selectedTargetAccount}
              onAccountChange={setSelectedTargetAccount}
              label="Target Monday.com Account"
            />
          </div>

          {/* Source */}
          <div className="col-md-6">
            <div className="card">
              <div className="card-header"><i className="bi bi-building me-1" /> Source Workspace</div>
              <div className="card-body">
                <select className="form-select mb-3" value={selectedWs} onChange={e => handleWorkspaceChange(e.target.value)}>
                  <option value="">Select a workspace...</option>
                  {workspaces.map(ws => (
                    <option key={ws.id} value={ws.id}>{ws.name} ({ws.kind})</option>
                  ))}
                </select>

                <label className="form-label">Target Workspace Name (optional)</label>
                <input type="text" className="form-control" value={targetName} onChange={e => setTargetName(e.target.value)}
                  placeholder={selectedWsName ? `${selectedWsName} (Migrated)` : 'Auto-generated from source'} />
              </div>
            </div>
          </div>

          {/* Components */}
          <div className="col-md-6">
            <ComponentSelector components={components} componentDefs={componentDefs} toggleComponent={toggleComponent} />
          </div>

          {/* Board Selector */}
          {selectedWs && (
            <div className="col-12">
              <div className="card">
                <div className="card-header d-flex justify-content-between align-items-center">
                  <span><i className="bi bi-kanban me-1" /> Boards to Migrate</span>
                  <div className="d-flex align-items-center gap-2">
                    <span className={`small fw-semibold ${!boardSelectorOpen ? 'text-primary' : 'text-muted'}`}>All boards</span>
                    <div className="form-check form-switch mb-0">
                      <input className="form-check-input" type="checkbox" id="boardSelectorToggle"
                        checked={boardSelectorOpen} onChange={e => setBoardSelectorOpen(e.target.checked)} />
                    </div>
                    <span className={`small fw-semibold ${boardSelectorOpen ? 'text-primary' : 'text-muted'}`}>Custom selection</span>
                  </div>
                </div>
                {boardSelectorOpen && (
                  <div className="card-body">
                    {boardsLoading ? (
                      <div className="text-center py-3">
                        <div className="spinner-border spinner-border-sm text-primary me-2" />
                        Loading boards...
                      </div>
                    ) : availableBoards.length === 0 ? (
                      <p className="text-muted mb-0">No boards found in this workspace.</p>
                    ) : (
                      <>
                        <div className="d-flex justify-content-between align-items-center mb-3">
                          <span className="text-muted">
                            {selectedBoardIds.length === 0
                              ? <span className="text-warning"><i className="bi bi-exclamation-triangle me-1" />No boards selected</span>
                              : <><strong>{selectedBoardIds.length}</strong> of {availableBoards.length} boards selected</>}
                          </span>
                          <div className="btn-group btn-group-sm">
                            <button className="btn btn-outline-primary" onClick={selectAllBoards}>Select All</button>
                            <button className="btn btn-outline-secondary" onClick={selectNoBoards}>Select None</button>
                          </div>
                        </div>
                        <div className="row g-2" style={{ maxHeight: '300px', overflowY: 'auto' }}>
                          {availableBoards.map(board => (
                            <div key={board.id} className="col-md-6 col-lg-4">
                              <div
                                className={`card h-100 cursor-pointer ${selectedBoardIds.includes(board.id) ? 'border-primary bg-primary bg-opacity-10' : ''}`}
                                style={{ cursor: 'pointer' }}
                                onClick={() => toggleBoardSelection(board.id)}
                              >
                                <div className="card-body py-2 px-3 d-flex align-items-center">
                                  <input type="checkbox" className="form-check-input me-2 flex-shrink-0"
                                    checked={selectedBoardIds.includes(board.id)}
                                    onChange={() => toggleBoardSelection(board.id)}
                                    onClick={e => e.stopPropagation()} />
                                  <div className="min-width-0">
                                    <div className="fw-semibold text-truncate" title={board.name}>{board.name}</div>
                                    <small className="text-muted">
                                      {board.groupCount} groups · {board.columnCount} columns
                                    </small>
                                  </div>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </>
                    )}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Managed Templates Section — shown when enabled and workspace selected */}
          {components.useManagedTemplates && selectedWs && (
            <div className="col-12">
              <div className="card border-info">
                <div className="card-header bg-info bg-opacity-10 d-flex justify-content-between align-items-center">
                  <span><i className="bi bi-diagram-2 me-1" /> Managed Templates</span>
                  {templateLoading && <span className="spinner-border spinner-border-sm text-info" />}
                </div>
                <div className="card-body">
                  {/* Same-account: auto-detected templates */}
                  {templateStatus && !selectedTargetAccount && (
                    <>
                      {templateStatus.templateCount > 0 ? (
                        <div className="alert alert-success mb-2">
                          <i className="bi bi-check-circle me-1" />
                          <strong>{templateStatus.templateCount} boards</strong> already linked to managed templates (same account).
                          These will be created as managed instances automatically.
                        </div>
                      ) : (
                        <div className="alert alert-info mb-2">
                          <i className="bi bi-info-circle me-1" />
                          No existing template links detected. Boards will be created using the standard approach.
                        </div>
                      )}
                      {templateStatus.unmappedCount > 0 && (
                        <div className="alert alert-warning mb-0">
                          <i className="bi bi-exclamation-triangle me-1" />
                          <strong>{templateStatus.unmappedCount} boards</strong> have no template link and will use standard creation:
                          <ul className="mb-0 mt-1">
                            {templateStatus.unmappedBoards.slice(0, 8).map((b, i) => (
                              <li key={i}>{b.name || b.id}</li>
                            ))}
                            {templateStatus.unmappedBoards.length > 8 && <li>...and {templateStatus.unmappedBoards.length - 8} more</li>}
                          </ul>
                        </div>
                      )}
                    </>
                  )}

                  {/* Same-account with target selected on same platform */}
                  {templateStatus && selectedTargetAccount && (() => {
                    const sourceAcct = accounts => accounts.find(a => a.role === 'source');
                    return null; // Handled by auto-detect above
                  })()}

                  {/* Cross-account: template preparation workflow */}
                  {selectedTargetAccount && (
                    <>
                      <p className="mb-2">
                        <strong>Cross-account template workflow:</strong> Create skeleton template boards on the target platform,
                        then manually add your automations and webhooks before running the migration.
                      </p>

                      {/* Existing template sets */}
                      {templateSets.length > 0 && (
                        <div className="mb-3">
                          <h6 className="mb-2">Saved Template Sets</h6>
                          {templateSets.map(set => (
                            <div key={set.id} className="d-flex align-items-center justify-content-between border rounded p-2 mb-2">
                              <div>
                                <strong>{set.name || set.id}</strong>
                                <br /><small className="text-muted">
                                  {set.boards ? set.boards.length : 0} boards &middot; Created {new Date(set.createdAt).toLocaleDateString()}
                                </small>
                              </div>
                              <button className="btn btn-outline-danger btn-sm" onClick={() => deleteTemplateSetHandler(set.id)}>
                                <i className="bi bi-trash me-1" />Remove
                              </button>
                            </div>
                          ))}
                        </div>
                      )}

                      {/* Prepare templates button */}
                      <button
                        className="btn btn-outline-info"
                        onClick={prepareTemplatesOnTarget}
                        disabled={preparingTemplates || !selectedWs}
                      >
                        {preparingTemplates ? (
                          <><span className="spinner-border spinner-border-sm me-1" />Creating template boards...</>
                        ) : (
                          <><i className="bi bi-plus-circle me-1" />Prepare Template Boards on Target</>
                        )}
                      </button>
                      <div className="form-text mt-1">
                        Creates skeleton boards with columns and groups on the target platform. After creation, open them in Monday.com to add automations and webhooks.
                      </div>
                    </>
                  )}

                  {/* No target selected */}
                  {!selectedTargetAccount && !templateStatus && !templateLoading && (
                    <div className="text-muted">
                      <i className="bi bi-info-circle me-1" />
                      Select a workspace above to detect existing managed templates, or select a cross-account target to prepare new templates.
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          <div className="col-12 text-end">
            <button className="btn btn-gw-orange btn-lg" onClick={startMigration} disabled={!selectedWs || !selectedTargetAccount}>
              <i className="bi bi-play-fill me-1" />Start Migration
              {boardSelectorOpen && selectedBoardIds.length > 0 && selectedBoardIds.length < availableBoards.length && (
                <span className="badge bg-white text-dark ms-2">{selectedBoardIds.length} boards</span>
              )}
            </button>
          </div>
        </div>
      )}

      {/* Step 2: Running */}
      {step === 'running' && (() => {
        const elapsed = progress?.startTime
          ? Math.floor((Date.now() - new Date(progress.startTime).getTime()) / 1000)
          : 0;
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        const elapsedStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;

        return (
          <div className="card migration-progress">
            <div className="card-header d-flex justify-content-between align-items-center">
              <span><i className="bi bi-hourglass-split me-1" /> Migration in Progress</span>
              <span className="badge bg-secondary"><i className="bi bi-clock me-1" />{elapsedStr}</span>
            </div>
            <div className="card-body">
              <div className="progress mb-3" style={{ height: '30px' }}>
                <div className={`progress-bar progress-bar-striped progress-bar-animated bg-primary`}
                  style={{ width: `${progress?.percent || 0}%`, transition: 'width 0.5s ease' }}>
                  {progress?.percent || 0}%
                </div>
              </div>
              <p className="mb-2 fs-5 text-center">{progress?.message || 'Initializing...'}</p>

              {/* Stats row */}
              {progress?.boardsTotal > 0 && (
                <div className="row g-2 mt-2 mb-3">
                  <div className="col-4 text-center">
                    <div className="fw-bold fs-5">{progress.boardsCompleted || 0} / {progress.boardsTotal}</div>
                    <small className="text-muted">Boards</small>
                  </div>
                  <div className="col-4 text-center">
                    <div className="fw-bold fs-5">{progress.itemsMigrated || 0}{progress.itemsTotal ? ` / ${progress.itemsTotal}` : ''}</div>
                    <small className="text-muted">Items</small>
                  </div>
                  <div className="col-4 text-center">
                    <div className="fw-bold fs-5">{progress.foldersCreated || 0}{progress.foldersTotal ? ` / ${progress.foldersTotal}` : ''}</div>
                    <small className="text-muted">Folders</small>
                  </div>
                </div>
              )}

              {progress?.errors?.length > 0 && (
                <div className="alert alert-warning mt-3 text-start">
                  <strong>Errors encountered ({progress.errors.length}):</strong>
                  <ul className="mb-0">{progress.errors.slice(-5).map((e, i) => <li key={i}>{e.board}: {e.msg}</li>)}</ul>
                  {progress.errors.length > 5 && <small className="text-muted">...and {progress.errors.length - 5} more</small>}
                </div>
              )}

              {progress?.lastUpdate && (
                <p className="text-muted text-center mt-2 mb-1" style={{ fontSize: '0.8rem' }}>
                  Last update: {new Date(progress.lastUpdate).toLocaleTimeString()}
                  {(() => {
                    const secsSinceUpdate = Math.floor((Date.now() - new Date(progress.lastUpdate).getTime()) / 1000);
                    return secsSinceUpdate > 8 ? ' — scheduling next phase...' : '';
                  })()}
                </p>
              )}

              <div className="text-center">
                <button className="btn btn-danger mt-2" onClick={handleCancel}
                  disabled={progress?.state === 'cancelling'}>
                  {progress?.state === 'cancelling' ? (
                    <><span className="spinner-border spinner-border-sm me-1" />Cancelling...</>
                  ) : (
                    <><i className="bi bi-x-circle me-1" />Cancel Migration</>
                  )}
                </button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Step 3: Done */}
      {step === 'done' && progress && (
        <div className="card">
          <div className={`card-header ${
            progress.state === 'completed' ? 'bg-success' :
            progress.state === 'error' ? 'bg-danger' :
            progress.state === 'cancelled' ? 'bg-secondary' :
            'bg-warning'
          } text-white`}>
            <i className={`bi ${
              progress.state === 'completed' ? 'bi-check-circle' :
              progress.state === 'error' ? 'bi-x-circle' :
              progress.state === 'cancelled' ? 'bi-slash-circle' :
              'bi-exclamation-triangle'
            } me-1`} />
            {progress.state === 'completed' ? 'Migration Complete' :
             progress.state === 'error' ? 'Migration Failed' :
             progress.state === 'cancelled' ? 'Migration Cancelled' :
             'Migration Completed with Issues'}
          </div>
          <div className="card-body">
            <div className="row g-3 mb-4">
              <div className="col-md-3"><StatCard value={progress.boardsCompleted || 0} label="Boards Migrated" icon="kanban" color="var(--match-great)" /></div>
              <div className="col-md-3"><StatCard value={progress.itemsMigrated || 0} label="Items Migrated" icon="list-task" color="var(--match-great)" /></div>
              <div className="col-md-3"><StatCard value={progress.itemsTotal || 0} label="Items Expected" icon="list-check" /></div>
              <div className="col-md-3"><StatCard value={progress.errors?.length || 0} label="Errors" icon="exclamation-triangle" color="var(--match-poor)" /></div>
            </div>
            {(
              (progress.foldersCreated > 0) ||
              (progress.boardMapping && progress.boardMapping.some(bm => bm.managedColumnsAttached > 0)) ||
              (progress.boardMapping && progress.boardMapping.some(bm => (bm.filesMigrated || 0) > 0)) ||
              (progress.documentMigration && progress.documentMigration.docsMigrated > 0)
            ) && (
              <div className="row g-3 mb-4">
                {progress.foldersCreated > 0 && (
                  <div className="col-md-3"><StatCard value={progress.foldersCreated} label="Folders Recreated" icon="folder" color="var(--gw-bright-blue)" /></div>
                )}
                {progress.boardMapping && progress.boardMapping.some(bm => bm.managedColumnsAttached > 0) && (
                  <div className="col-md-3"><StatCard value={progress.boardMapping.reduce((sum, bm) => sum + (bm.managedColumnsAttached || 0), 0)} label="Managed Columns Linked" icon="link-45deg" color="var(--gw-bright-blue)" /></div>
                )}
                {progress.boardMapping && progress.boardMapping.some(bm => (bm.filesMigrated || 0) > 0) && (
                  <div className="col-md-3"><StatCard value={progress.boardMapping.reduce((sum, bm) => sum + (bm.filesMigrated || 0), 0)} label="Files Migrated" icon="paperclip" color="var(--match-great)" /></div>
                )}
                {progress.documentMigration && (
                  <>
                    <div className="col-md-3"><StatCard value={progress.documentMigration.docsMigrated || 0} label="Docs Migrated" icon="file-earmark-text" color="var(--match-great)" /></div>
                    {progress.documentMigration.docsSkipped > 0 && (
                      <div className="col-md-3"><StatCard value={progress.documentMigration.docsSkipped} label="Docs Skipped" icon="file-earmark-x" color="var(--match-poor)" /></div>
                    )}
                  </>
                )}
              </div>
            )}

            {progress.state === 'cancelled' && (
              <div className="alert alert-secondary mb-3">
                <i className="bi bi-info-circle me-1" />
                <strong>Migration was cancelled.</strong> Boards that were already migrated before cancellation remain on the target.
                Any pending continuation triggers have been cleaned up.
                {progress.boardsCompleted > 0 && (
                  <span> {progress.boardsCompleted} of {progress.boardsTotal || '?'} boards were completed before cancellation.</span>
                )}
              </div>
            )}

            <p><strong>Target Workspace:</strong> {progress.targetWorkspaceName || 'N/A'}</p>
            <p><strong>Migration ID:</strong> <code>{progress.id}</code></p>
            {progress.isCrossAccount && <p><span className="badge bg-warning text-dark">Cross-Account Migration</span></p>}

            {/* Google Drive backup link */}
            {progress.documentMigration && progress.documentMigration.driveFolder && (
              <div className="alert alert-success mb-3">
                <i className="bi bi-cloud-arrow-down me-1" />
                <strong>Document Backup:</strong>{' '}
                Markdown backups saved to Google Drive:{' '}
                <a href={progress.documentMigration.driveFolder.url} target="_blank" rel="noopener noreferrer" className="alert-link">
                  <i className="bi bi-folder me-1" />{progress.documentMigration.driveFolder.name}
                </a>
              </div>
            )}

            <p className="text-muted">Before/after mapping has been saved to the migration spreadsheet.</p>

            {/* Detailed Error Report */}
            {progress.errors && progress.errors.length > 0 && (
              <div className="alert alert-danger mb-3">
                <h6 className="alert-heading"><i className="bi bi-exclamation-triangle-fill me-1" />Errors ({progress.errors.length})</h6>
                <div style={{ maxHeight: '300px', overflowY: 'auto' }}>
                  <table className="table table-sm table-bordered mb-0" style={{ fontSize: '0.85rem' }}>
                    <thead><tr><th style={{width:'25%'}}>Board / Phase</th><th>Error Details</th></tr></thead>
                    <tbody>
                      {progress.errors.map((err, i) => (
                        <tr key={i}>
                          <td><strong>{err.board || err.phase || 'Unknown'}</strong></td>
                          <td style={{ wordBreak: 'break-word' }}>{err.msg || err.error || JSON.stringify(err)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* Per-Board Error Details */}
            {progress.boardMapping && progress.boardMapping.some(bm => bm.error) && (
              <div className="alert alert-warning mb-3">
                <h6 className="alert-heading"><i className="bi bi-clipboard-x me-1" />Board-Level Errors</h6>
                <div style={{ maxHeight: '250px', overflowY: 'auto' }}>
                  {progress.boardMapping.filter(bm => bm.error).map((bm, i) => (
                    <div key={i} className="mb-2 pb-2 border-bottom">
                      <strong>{bm.sourceBoardName}</strong>
                      <div className="text-danger" style={{ fontSize: '0.85rem', wordBreak: 'break-word' }}>{bm.error}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {progress.boardMapping && (
              <div className="scrollable-table mt-3">
                <table className="table table-gw table-sm mb-0">
                  <thead><tr><th>Source Board</th><th>Folder</th><th>Target Board ID</th><th>Method</th><th>Status</th><th>Items</th><th>Files</th></tr></thead>
                  <tbody>
                    {progress.boardMapping.map((bm, i) => (
                      <tr key={i}>
                        <td>{bm.sourceBoardName}</td>
                        <td>{bm.folderName ? <span className="badge bg-light text-dark"><i className="bi bi-folder me-1" />{bm.folderName}</span> : <span className="text-muted">—</span>}</td>
                        <td><code>{bm.targetBoardId || 'N/A'}</code></td>
                        <td>
                          <span className={`badge ${bm.migrationMethod === 'managed_template' ? 'bg-primary' : bm.migrationMethod === 'template' ? 'bg-info' : 'bg-secondary'}`}>
                            <i className={`bi ${bm.migrationMethod === 'managed_template' ? 'bi-diagram-2' : bm.migrationMethod === 'template' ? 'bi-copy' : 'bi-wrench'} me-1`} />
                            {bm.migrationMethod === 'managed_template' ? 'Managed Template' : bm.migrationMethod === 'template' ? 'Template Clone' : 'Manual'}
                          </span>
                        </td>
                        <td><span className={`badge status-${bm.status}`}>{bm.status}</span></td>
                        <td>{bm.itemsMigrated} / {bm.itemsTotal}</td>
                        <td>{bm.filesMigrated > 0 ? <span className="badge bg-success"><i className="bi bi-paperclip me-1" />{bm.filesMigrated}</span> : <span className="text-muted">—</span>}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            {/* Document Mapping Table */}
            {progress.docMapping && progress.docMapping.length > 0 && (
              <div className="scrollable-table mt-3">
                <h6><i className="bi bi-file-earmark-text me-1" />Document Migration Details</h6>
                <table className="table table-gw table-sm mb-0">
                  <thead><tr><th>Document</th><th>Status</th><th>Target Doc ID</th><th>Drive Backup</th></tr></thead>
                  <tbody>
                    {progress.docMapping.map((dm, i) => (
                      <tr key={i}>
                        <td>{dm.sourceDocName || dm.sourceDocTitle || dm.sourceDocId}</td>
                        <td><span className={`badge ${dm.status === 'migrated' ? 'bg-success' : dm.status === 'migrated_empty' ? 'bg-info' : dm.status === 'empty' ? 'bg-secondary' : 'bg-danger'}`}>{dm.status}</span></td>
                        <td><code>{dm.targetDocId || 'N/A'}</code></td>
                        <td>
                          {dm.driveFileUrl ? (
                            <a href={dm.driveFileUrl} target="_blank" rel="noopener noreferrer" className="btn btn-sm btn-outline-secondary">
                              <i className="bi bi-file-earmark-arrow-down me-1" />.md
                            </a>
                          ) : <span className="text-muted">-</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            <div className="mt-4 text-center">
              <button className="btn btn-gw-primary" onClick={resetMigration}>
                <i className="bi bi-arrow-repeat me-1" />Start New Migration
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── Discrepancy Detail Modal ─────────────────────────────────────────────────

const DiscrepancyModal = ({ show, onClose, title, data }) => {
  if (!show || !data) return null;

  return ReactDOM.createPortal(
    <div className="modal d-block" style={{ backgroundColor: 'rgba(0,0,0,0.5)' }} onClick={onClose}>
      <div className="modal-dialog modal-dialog-centered modal-lg" onClick={e => e.stopPropagation()}>
        <div className="modal-content">
          <div className="modal-header">
            <h5 className="modal-title"><i className="bi bi-info-circle me-2" />{title}</h5>
            <button type="button" className="btn-close" onClick={onClose} />
          </div>
          <div className="modal-body">
            {data.type === 'items' && (
              <div>
                <div className="row g-3 mb-3">
                  <div className="col-4"><StatCard value={data.source} label="Source Items" icon="list-task" /></div>
                  <div className="col-4"><StatCard value={data.target} label="Target Items" icon="list-check" /></div>
                  <div className="col-4"><StatCard value={data.diff > 0 ? '+' + data.diff : data.diff} label="Difference" icon="plus-slash-minus" color={data.diff === 0 ? 'var(--match-great)' : 'var(--match-poor)'} /></div>
                </div>
                <div className="alert alert-info mb-0">
                  <i className="bi bi-info-circle me-1" />
                  {data.diff < 0 ? `${Math.abs(data.diff)} item(s) are missing from the target board.` :
                   data.diff > 0 ? `${data.diff} extra item(s) exist in the target board.` :
                   'Item counts match perfectly.'}
                </div>
              </div>
            )}

            {data.type === 'groups' && (
              <div>
                <div className="row g-3 mb-3">
                  <div className="col-4"><StatCard value={data.source} label="Source Groups" icon="collection" /></div>
                  <div className="col-4"><StatCard value={data.matched} label="Matched" icon="check-circle" color="var(--match-great)" /></div>
                  <div className="col-4"><StatCard value={data.missing.length} label="Missing" icon="x-circle" color={data.missing.length > 0 ? 'var(--match-poor)' : 'var(--match-great)'} /></div>
                </div>
                {data.missing.length > 0 && (
                  <div>
                    <h6>Missing Groups</h6>
                    <table className="table table-sm table-gw mb-0">
                      <thead><tr><th>#</th><th>Group Name</th></tr></thead>
                      <tbody>
                        {data.missing.map((g, i) => (
                          <tr key={i}><td>{i + 1}</td><td><strong>{g}</strong></td></tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
                {data.missing.length === 0 && (
                  <div className="alert alert-success mb-0"><i className="bi bi-check-circle me-1" />All groups matched.</div>
                )}
              </div>
            )}

            {data.type === 'columns' && (
              <div>
                <div className="row g-3 mb-3">
                  <div className="col-3"><StatCard value={data.source} label="Source Columns" icon="layout-three-columns" /></div>
                  <div className="col-3"><StatCard value={data.target} label="Target Columns" icon="layout-three-columns" /></div>
                  <div className="col-3"><StatCard value={data.matched} label="Matched" icon="check-circle" color="var(--match-great)" /></div>
                  <div className="col-3"><StatCard value={data.missing.length} label="Missing" icon="x-circle" color={data.missing.length > 0 ? 'var(--match-poor)' : 'var(--match-great)'} /></div>
                </div>
                {data.missing.length > 0 && (
                  <div className="mb-3">
                    <h6>Missing Columns (in source, not in target)</h6>
                    <table className="table table-sm table-gw mb-0">
                      <thead><tr><th>Column Name</th><th>Type</th></tr></thead>
                      <tbody>
                        {data.missing.map((c, i) => (
                          <tr key={i}><td><strong>{c.title}</strong></td><td><span className="badge bg-secondary">{c.type}</span></td></tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
                {data.extra && data.extra.length > 0 && (
                  <div>
                    <h6>Extra Columns (in target, not in source)</h6>
                    <table className="table table-sm table-gw mb-0">
                      <thead><tr><th>Column Name</th><th>Type</th></tr></thead>
                      <tbody>
                        {data.extra.map((c, i) => (
                          <tr key={i}><td><strong>{c.title}</strong></td><td><span className="badge bg-info">{c.type}</span></td></tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
                {data.missing.length === 0 && (!data.extra || data.extra.length === 0) && (
                  <div className="alert alert-success mb-0"><i className="bi bi-check-circle me-1" />All columns matched.</div>
                )}
              </div>
            )}
          </div>
          <div className="modal-footer">
            <button className="btn btn-secondary" onClick={onClose}>Close</button>
          </div>
        </div>
      </div>
    </div>,
    document.getElementById('modal-root')
  );
};

// ── Validation Tab ───────────────────────────────────────────────────────────

const ValidationTab = () => {
  const toast = useToast();
  const [workspaces, setWorkspaces] = useState(window.initialWorkspaces || []);
  const [sourceWs, setSourceWs] = useState('');
  const [targetWs, setTargetWs] = useState('');
  const [loading, setLoading] = useState(false);
  const [report, setReport] = useState(null);
  const [savedMigrations, setSavedMigrations] = useState([]);
  const [verifyUsers, setVerifyUsers] = useState(false);
  const [modalData, setModalData] = useState(null);

  // Cross-account support
  const [selectedTargetAccount, setSelectedTargetAccount] = useState('');
  const [targetWorkspaces, setTargetWorkspaces] = useState([]);
  const [targetWsLoading, setTargetWsLoading] = useState(false);

  useEffect(() => {
    loadData();
  }, []);

  // When target account changes, load its workspaces
  useEffect(() => {
    if (selectedTargetAccount) {
      loadTargetWorkspaces(selectedTargetAccount);
    } else {
      setTargetWorkspaces([]);
      setTargetWs('');
    }
  }, [selectedTargetAccount]);

  const loadData = async () => {
    try {
      const calls = [api.call('getSavedMigrations')];
      if (workspaces.length === 0) calls.unshift(api.call('getAccountInventory'));
      else calls.unshift(Promise.resolve(null));

      const [invResult, migResult] = await Promise.all(calls);
      if (invResult && invResult.success) {
        const ws = (invResult.data.workspaces || []).sort((a, b) => a.name.localeCompare(b.name));
        setWorkspaces(ws);
        window.initialWorkspaces = ws;
      }
      if (migResult.success) setSavedMigrations(migResult.data || []);
    } catch (e) {
      toast.show(e.message, 'danger');
    }
  };

  const loadTargetWorkspaces = async (accountId) => {
    setTargetWsLoading(true);
    setTargetWs('');
    try {
      const result = await api.call('getTargetWorkspaces', accountId);
      if (result.success) {
        const ws = (result.workspaces || []).sort((a, b) => a.name.localeCompare(b.name));
        setTargetWorkspaces(ws);
      }
    } catch (e) { toast.show('Failed to load target workspaces: ' + e.message, 'danger'); }
    setTargetWsLoading(false);
  };

  const runValidation = async () => {
    if (!sourceWs || !targetWs) {
      toast.show('Select both source and target workspaces', 'warning');
      return;
    }
    setLoading(true);
    setReport(null);
    try {
      const result = await api.call('validateMigration', sourceWs, targetWs, {
        verifyUsers: verifyUsers,
        targetAccountId: selectedTargetAccount || null
      });
      if (result.success) {
        setReport(result.data);
      } else {
        toast.show(result.error || 'Validation failed', 'danger');
      }
    } catch (e) {
      toast.show(e.message, 'danger');
    }
    setLoading(false);
  };

  const [pdfLoading, setPdfLoading] = useState(false);

  const downloadReport = async () => {
    if (!report || pdfLoading) return;
    setPdfLoading(true);
    toast.show('Generating PDF report on server...', 'info', 8000);
    try {
      const result = await callGoogleScript('generateValidationPdf', report);
      if (result.success && result.url) {
        window.open(result.url, '_blank');
        toast.show('PDF report ready! Check your downloads.', 'success');
      } else {
        throw new Error(result.error || 'Failed to generate PDF');
      }
    } catch (err) {
      console.error('PDF generation error:', err);
      toast.show('Error generating PDF: ' + err.message, 'danger');
    } finally {
      setPdfLoading(false);
    }
  };

  return (
    <div>
      <h4 className="mb-1"><i className="bi bi-check2-square me-2" />Migration Validation</h4>
      <p className="text-muted mb-4">Compare a source workspace against a migrated workspace to verify completeness.</p>

      {/* Saved Migrations Quick-Select */}
      {savedMigrations.length > 0 && (
        <div className="card mb-4">
          <div className="card-header"><i className="bi bi-clock-history me-1" /> Recent Migrations</div>
          <div className="card-body">
            <div className="scrollable-table" style={{ maxHeight: '200px' }}>
              <table className="table table-gw table-sm mb-0">
                <thead><tr><th>Migration ID</th><th>Source</th><th>Target</th><th>Status</th><th>Date</th><th></th></tr></thead>
                <tbody>
                  {savedMigrations.slice(0, 10).map(m => (
                    <tr key={m.migrationId}>
                      <td><code>{m.migrationId}</code></td>
                      <td>{m.sourceWorkspace}</td>
                      <td>{m.targetWorkspace}</td>
                      <td><span className={`badge status-${m.lastStatus === 'completed' ? 'success' : m.lastStatus}`}>{m.lastStatus}</span></td>
                      <td><small>{m.lastTimestamp ? new Date(m.lastTimestamp).toLocaleDateString() : ''}</small></td>
                      <td>
                        <button className="btn btn-sm btn-outline-primary" onClick={() => {
                          // Try to find workspace IDs from the migration log
                          toast.show('Select the source and target workspaces below to validate.', 'info');
                        }}>
                          <i className="bi bi-arrow-right" />
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {/* Target Account Selection */}
      <div className="mb-4">
        <TargetAccountSelector
          selectedAccountId={selectedTargetAccount}
          onAccountChange={setSelectedTargetAccount}
          label="Target Monday.com Account (for cross-account validation)"
        />
      </div>

      {/* Workspace Selection */}
      <div className="row g-3 mb-4">
        <div className="col-md-5">
          <label className="form-label"><strong>Source Workspace (Original)</strong></label>
