          <select className="form-select" value={sourceWs} onChange={e => setSourceWs(e.target.value)}>
            <option value="">Select source...</option>
            {workspaces.map(ws => <option key={ws.id} value={ws.id}>{ws.name}</option>)}
          </select>
        </div>
        <div className="col-md-2 d-flex align-items-end justify-content-center">
          <i className="bi bi-arrow-right fs-3 text-muted" />
        </div>
        <div className="col-md-5">
          <label className="form-label"><strong>Target Workspace (Migrated)</strong></label>
          {selectedTargetAccount ? (
            <div>
              <select className="form-select" value={targetWs} onChange={e => setTargetWs(e.target.value)} disabled={targetWsLoading}>
                <option value="">{targetWsLoading ? 'Loading target workspaces...' : 'Select target...'}</option>
                {targetWorkspaces.map(ws => <option key={ws.id} value={ws.id}>{ws.name}</option>)}
              </select>
              {targetWorkspaces.length > 50 && (
                <small className="text-muted mt-1 d-block">
                  <i className="bi bi-info-circle me-1" />{targetWorkspaces.length} workspaces — use the dropdown to search by name
                </small>
              )}
            </div>
          ) : (
            <select className="form-select" value={targetWs} onChange={e => setTargetWs(e.target.value)}>
              <option value="">Select target...</option>
              {workspaces.map(ws => <option key={ws.id} value={ws.id}>{ws.name}</option>)}
            </select>
          )}
        </div>
      </div>

      {/* Verification Options */}
      <div className="card mb-4">
        <div className="card-body py-2">
          <div className="form-check">
            <input className="form-check-input" type="checkbox" id="verifyUsers"
              checked={verifyUsers} onChange={e => setVerifyUsers(e.target.checked)} />
            <label className="form-check-label" htmlFor="verifyUsers">
              <strong>Verify Users & Guests</strong>
              <br /><small className="text-muted">Compare board subscribers, owners, and team assignments between source and target workspaces</small>
            </label>
          </div>
        </div>
      </div>

      <div className="text-center mb-4">
        <button className="btn btn-gw-primary btn-lg" onClick={runValidation} disabled={!sourceWs || !targetWs || loading}>
          {loading ? <><span className="spinner-border spinner-border-sm me-1" />Validating...</> : <><i className="bi bi-check2-all me-1" />Run Validation</>}
        </button>
      </div>

      {loading && <LoadingSpinner message="Comparing workspaces..." />}

      {/* Validation Report */}
      {report && !loading && (
        <div>
          {/* Download button */}
          <div className="text-end mb-3">
            <button className="btn btn-outline-secondary" onClick={downloadReport} disabled={pdfLoading}>
              {pdfLoading ? <><span className="spinner-border spinner-border-sm me-1" />Generating...</> : <><i className="bi bi-file-earmark-pdf me-1" />Download PDF Report</>}
            </button>
          </div>

          {/* Discrepancy Modal */}
          <DiscrepancyModal show={!!modalData} onClose={() => setModalData(null)} title={modalData?.title || ''} data={modalData} />

          {/* Match Percentages */}
          <div className="row g-3 mb-4">
            <div className="col text-center">
              <MatchRing percent={report.matchPercentages.overall} size={120} />
              <p className="mt-2"><strong>Overall Match</strong></p>
            </div>
            <div className="col text-center">
              <MatchRing percent={report.matchPercentages.boards} size={90} />
              <p className="mt-2">Boards</p>
            </div>
            <div className="col text-center">
              <MatchRing percent={report.matchPercentages.items} size={90} />
              <p className="mt-2">Items</p>
            </div>
            <div className="col text-center">
              <MatchRing percent={report.matchPercentages.groups} size={90} />
              <p className="mt-2">Groups</p>
            </div>
            <div className="col text-center">
              <MatchRing percent={report.matchPercentages.columns} size={90} />
              <p className="mt-2">Columns</p>
            </div>
            {report.matchPercentages.documents != null && (
              <div className="col text-center">
                <MatchRing percent={report.matchPercentages.documents} size={90} />
                <p className="mt-2">Documents</p>
              </div>
            )}
            {report.matchPercentages.users != null && (
              <div className="col text-center">
                <MatchRing percent={report.matchPercentages.users} size={90} />
                <p className="mt-2">Users</p>
              </div>
            )}
          </div>

          {/* Side-by-Side Counts */}
          <div className="card mb-4">
            <div className="card-header"><i className="bi bi-bar-chart me-1" /> Count Comparison</div>
            <div className="card-body">
              <div className="row g-0">
                <div className="col-5 text-center">
                  <h6 className="text-muted mb-3">SOURCE</h6>
                  <h5>{report.source.workspaceName}</h5>
                </div>
                <div className="col-2 text-center"><h6 className="text-muted mb-3">vs</h6></div>
                <div className="col-5 text-center">
                  <h6 className="text-muted mb-3">TARGET</h6>
                  <h5>{report.target.workspaceName}</h5>
                </div>
              </div>
              <hr />
              {[
                { label: 'Boards', src: report.source.boardCount, tgt: report.target.boardCount },
                { label: 'Items', src: report.source.totalItems, tgt: report.target.totalItems },
                { label: 'Groups', src: report.source.totalGroups, tgt: report.target.totalGroups },
                { label: 'Columns', src: report.source.totalColumns, tgt: report.target.totalColumns },
                { label: 'Documents', src: report.source.totalDocuments ?? 0, tgt: report.target.totalDocuments ?? 0 },
                { label: 'Forms', src: report.source.totalForms ?? 0, tgt: report.target.totalForms ?? 0 }
              ].map(row => (
                <div key={row.label} className="comparison-row">
                  <div className="source-val">{row.src}</div>
                  <div className="vs-indicator">
                    <strong>{row.label}</strong><br />
                    {row.src === row.tgt ?
                      <span className="match-great"><i className="bi bi-check-circle" /> Match</span> :
                      <span className="match-poor"><i className="bi bi-x-circle" /> {row.tgt - row.src > 0 ? '+' : ''}{row.tgt - row.src}</span>
                    }
                  </div>
                  <div className="target-val">{row.tgt}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Board-by-Board Comparison */}
          <div className="card mb-4">
            <div className="card-header"><i className="bi bi-table me-1" /> Board-by-Board Comparison</div>
            <div className="card-body">
              <div className="scrollable-table">
                <table className="table table-gw table-sm mb-0">
                  <thead>
                    <tr>
                      <th>Board</th>
                      <th>Matched</th>
                      <th>Method</th>
                      <th>Source Items</th>
                      <th>Target Items</th>
                      <th>Item Diff</th>
                      <th>Groups</th>
                      <th>Columns</th>
                    </tr>
                  </thead>
                  <tbody>
                    {report.boardComparisons.map((bc, i) => {
                      const hasItemDiff = !bc.items.match;
                      const hasGroupDiff = bc.groups.missing?.length > 0;
                      const hasColDiff = (bc.columns.missing?.length > 0) || (bc.columns.extra?.length > 0);
                      const clickable = 'text-decoration-underline';
                      return (
                        <tr key={i}>
                          <td><strong>{bc.boardName}</strong></td>
                          <td>{bc.matched ? <span className="match-great"><i className="bi bi-check-circle" /></span> : <span className="match-poor"><i className="bi bi-x-circle" /></span>}</td>
                          <td>
                            {bc.migrationMethod === 'managed_template' ? (
                              <span className="badge bg-primary" title={bc.templateLinkage?.targetTemplateBoardId ? 'Template: ' + bc.templateLinkage.targetTemplateBoardId : ''}>
                                <i className="bi bi-diagram-2 me-1" />Managed
                              </span>
                            ) : bc.migrationMethod === 'template' ? (
                              <span className="badge bg-info"><i className="bi bi-copy me-1" />Clone</span>
                            ) : bc.matched ? (
                              <span className="badge bg-secondary"><i className="bi bi-wrench me-1" />Manual</span>
                            ) : <span className="text-muted">—</span>}
                          </td>
                          <td>{bc.items.source}</td>
                          <td>{bc.items.target}</td>
                          <td className={bc.items.match ? 'match-great' : 'match-poor'}
                            style={hasItemDiff ? { cursor: 'pointer' } : {}}
                            onClick={() => hasItemDiff && setModalData({ type: 'items', title: bc.boardName + ' — Item Discrepancy', source: bc.items.source, target: bc.items.target, diff: bc.items.diff })}>
                            {bc.items.match ? 'OK' : <span className={clickable}>{(bc.items.diff > 0 ? '+' : '') + bc.items.diff}</span>}
                          </td>
                          <td style={hasGroupDiff ? { cursor: 'pointer' } : {}}
                            onClick={() => hasGroupDiff && setModalData({ type: 'groups', title: bc.boardName + ' — Group Discrepancy', source: bc.groups.source, matched: bc.groups.matched, missing: bc.groups.missing || [] })}>
                            {bc.groups.matched}/{bc.groups.source}
                            {hasGroupDiff && <small className={`text-danger ${clickable}`}> (-{bc.groups.missing.length})</small>}
                          </td>
                          <td style={hasColDiff ? { cursor: 'pointer' } : {}}
                            onClick={() => hasColDiff && setModalData({ type: 'columns', title: bc.boardName + ' — Column Discrepancy', source: bc.columns.source, target: bc.columns.target, matched: bc.columns.matched, missing: bc.columns.missing || [], extra: bc.columns.extra || [], templateProvided: bc.columns.templateProvided || [], unexpectedExtra: bc.columns.unexpectedExtra || [] })}>
                            {bc.columns.matched}/{bc.columns.source}
                            {bc.columns.missing?.length > 0 && <small className={`text-danger ${clickable}`}> (-{bc.columns.missing.length})</small>}
                            {bc.columns.templateProvided?.length > 0 && <small className={`text-primary ${clickable}`} title="Template-provided columns"> (+{bc.columns.templateProvided.length} tpl)</small>}
                            {bc.columns.unexpectedExtra?.length > 0 && <small className={`text-warning ${clickable}`}> (+{bc.columns.unexpectedExtra.length})</small>}
                            {!bc.columns.templateProvided?.length && !bc.columns.unexpectedExtra?.length && bc.columns.extra?.length > 0 && <small className={`text-info ${clickable}`}> (+{bc.columns.extra.length})</small>}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          {/* Unmatched boards */}
          {report.unmatchedBoards?.length > 0 && (
            <div className="alert alert-danger">
              <strong>Boards not found in target:</strong> {report.unmatchedBoards.join(', ')}
            </div>
          )}

          {report.extraTargetBoards?.length > 0 && (
            <div className="alert alert-info">
              <strong>Extra boards in target:</strong> {report.extraTargetBoards.join(', ')}
            </div>
          )}

          {/* Document & Form Comparison */}
          {(report.documentComparison || report.formComparison) && (
            <div className="card mb-4">
              <div className="card-header"><i className="bi bi-file-earmark-text me-1" /> Documents & Forms</div>
              <div className="card-body">
                {/* Document details */}
                {report.documentComparison && (
                  <div className="mb-3">
                    <h6>Documents ({report.documentComparison.sourceCount} source / {report.documentComparison.targetCount} target — {report.documentComparison.matched?.length || 0} matched)</h6>
                    {report.documentComparison.missing?.length > 0 && (
                      <div className="alert alert-danger py-2 mb-2">
                        <strong><i className="bi bi-file-earmark-x me-1" />Missing Documents ({report.documentComparison.missing.length}):</strong>
                        <ul className="mb-0 mt-1">
                          {report.documentComparison.missing.map((d, i) => (
                            <li key={i}>{d.name}{d.kind ? ` (${d.kind})` : ''}</li>
                          ))}
                        </ul>
                      </div>
                    )}
                    {report.documentComparison.extra?.length > 0 && (
                      <div className="alert alert-info py-2 mb-2">
                        <strong><i className="bi bi-file-earmark-plus me-1" />Extra Documents in Target ({report.documentComparison.extra.length}):</strong>
                        <ul className="mb-0 mt-1">
                          {report.documentComparison.extra.map((d, i) => (
                            <li key={i}>{d.name}{d.kind ? ` (${d.kind})` : ''}</li>
                          ))}
                        </ul>
                      </div>
                    )}
                    {report.documentComparison.missing?.length === 0 && report.documentComparison.extra?.length === 0 && (
                      <div className="alert alert-success py-2 mb-2"><i className="bi bi-check-circle me-1" />All documents matched.</div>
                    )}
                  </div>
                )}
                {/* Form details */}
                {report.formComparison && (report.formComparison.sourceCount > 0 || report.formComparison.targetCount > 0) && (
                  <div>
                    <h6>Forms ({report.formComparison.sourceCount} source / {report.formComparison.targetCount} target — {report.formComparison.matched?.length || 0} matched)</h6>
                    {report.formComparison.missing?.length > 0 && (
                      <div className="alert alert-danger py-2 mb-2">
                        <strong><i className="bi bi-ui-checks me-1" />Missing Forms ({report.formComparison.missing.length}):</strong>
                        <ul className="mb-0 mt-1">
                          {report.formComparison.missing.map((f, i) => (
                            <li key={i}>{f.name} <small className="text-muted">({f.board})</small></li>
                          ))}
                        </ul>
                      </div>
                    )}
                    {report.formComparison.extra?.length > 0 && (
                      <div className="alert alert-info py-2 mb-2">
                        <strong><i className="bi bi-ui-checks-grid me-1" />Extra Forms in Target ({report.formComparison.extra.length}):</strong>
                        <ul className="mb-0 mt-1">
                          {report.formComparison.extra.map((f, i) => (
                            <li key={i}>{f.name} <small className="text-muted">({f.board})</small></li>
                          ))}
                        </ul>
                      </div>
                    )}
                    {report.formComparison.missing?.length === 0 && report.formComparison.extra?.length === 0 && (
                      <div className="alert alert-success py-2 mb-2"><i className="bi bi-check-circle me-1" />All forms matched.</div>
                    )}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Template Linkage Summary */}
          {report.templateStats && (report.templateStats.managedTemplateBoards > 0 || report.templateStats.templateCloneBoards > 0) && (
            <div className="card mb-4">
              <div className="card-header"><i className="bi bi-diagram-2 me-1" /> Template Linkage</div>
              <div className="card-body">
                <div className="row g-3 mb-3">
                  <div className="col-md-3">
                    <StatCard value={report.templateStats.managedTemplateBoards} label="Managed Template" icon="diagram-2" color="var(--bs-primary)" />
                  </div>
                  <div className="col-md-3">
                    <StatCard value={report.templateStats.templateCloneBoards} label="Template Clone" icon="copy" color="var(--bs-info)" />
                  </div>
                  <div className="col-md-3">
                    <StatCard value={report.templateStats.manualBoards} label="Manual" icon="wrench" />
                  </div>
                  <div className="col-md-3">
                    <StatCard
                      value={report.templateStats.linkInconsistent}
                      label="Link Issues"
                      icon={report.templateStats.linkInconsistent > 0 ? 'exclamation-triangle' : 'check-circle'}
                      color={report.templateStats.linkInconsistent > 0 ? 'var(--gw-orange)' : 'var(--match-great)'}
                    />
                  </div>
                </div>
                {report.templateStats.linkInconsistent > 0 && (
                  <div className="alert alert-warning mb-0">
                    <i className="bi bi-exclamation-triangle me-1" />
                    <strong>{report.templateStats.linkInconsistent} boards</strong> have inconsistent template linkage — source and target don't match in template status. Review these boards to ensure automations are properly connected.
                  </div>
                )}
                {report.templateStats.linkInconsistent === 0 && report.templateStats.managedTemplateBoards > 0 && (
                  <div className="alert alert-success mb-0">
                    <i className="bi bi-check-circle me-1" />
                    All managed template boards have consistent linkage. Automations and webhooks from templates should propagate correctly.
                  </div>
                )}
              </div>
            </div>
          )}

          {/* User & Guest Verification Results */}
          {report.userVerification && (() => {
            const uv = report.userVerification;
            return (
              <div>
                {/* User Verification Summary */}
                <div className="card mb-4">
                  <div className="card-header"><i className="bi bi-people me-1" /> User & Guest Verification</div>
                  <div className="card-body">
                    <div className="row g-3 mb-3">
                      <div className="col-md-2"><StatCard value={uv.summary.totalSourceSubscribers} label="Subscribers" icon="people" /></div>
                      <div className="col-md-2"><StatCard value={uv.summary.totalMatchedSubscribers} label="Matched" icon="check-circle" color="var(--match-great)" /></div>
                      <div className="col-md-2"><StatCard value={uv.summary.totalMissingSubscribers} label="Missing" icon="x-circle" color={uv.summary.totalMissingSubscribers > 0 ? 'var(--match-poor)' : undefined} /></div>
                      <div className="col-md-2"><StatCard value={uv.summary.totalRoleMismatches} label="Role Mismatches" icon="exclamation-triangle" color={uv.summary.totalRoleMismatches > 0 ? 'var(--gw-orange)' : undefined} /></div>
                      <div className="col-md-2"><StatCard value={uv.summary.totalMissingTeams} label="Missing Teams" icon="people-fill" color={uv.summary.totalMissingTeams > 0 ? 'var(--gw-orange)' : undefined} /></div>
                    </div>

                    {/* Missing subscribers detail */}
                    {uv.summary.missingSubscribers && uv.summary.missingSubscribers.length > 0 && (
                      <div className="alert alert-danger py-2 mb-2 mt-3">
                        <strong><i className="bi bi-person-x me-1" />Missing from target ({uv.summary.missingSubscribers.length}):</strong>
                        <ul className="mb-0 mt-1">
                          {uv.summary.missingSubscribers.map((u, i) => (
                            <li key={i}>
                              <strong>{u.name}</strong>{u.email ? ` (${u.email})` : ''}
                              {u.role === 'owner' && <span className="badge bg-primary ms-1">owner</span>}
                              {u.isGuest && <span className="badge bg-warning text-dark ms-1">guest</span>}
                              {u.boards && u.boards.length > 0 && <small className="text-muted ms-1">— Boards: {u.boards.join(', ')}</small>}
                            </li>
                          ))}
                        </ul>
                      </div>
                    )}

                    {/* Role mismatch detail */}
                    {uv.summary.roleMismatches && uv.summary.roleMismatches.length > 0 && (
                      <div className="alert alert-warning py-2 mb-2">
                        <strong><i className="bi bi-exclamation-triangle me-1" />Role Mismatches ({uv.summary.roleMismatches.length}):</strong>
                        <ul className="mb-0 mt-1">
                          {uv.summary.roleMismatches.map((u, i) => (
                            <li key={i}>
                              <strong>{u.name}</strong>: {u.sourceRole} &rarr; {u.targetRole}
                              {u.boards && u.boards.length > 0 && <small className="text-muted ms-1">— Boards: {u.boards.join(', ')}</small>}
                            </li>
                          ))}
                        </ul>
                      </div>
                    )}

                  </div>
                </div>

                {/* Per-board subscriber comparison */}
                <div className="card mb-4">
                  <div className="card-header"><i className="bi bi-kanban me-1" /> Board Subscriber Comparison</div>
                  <div className="card-body">
                    <div className="scrollable-table" style={{ maxHeight: '400px' }}>
                      <table className="table table-gw table-sm mb-0">
                        <thead>
                          <tr>
                            <th>Board</th>
                            <th>Kind</th>
                            <th>Source Subs</th>
                            <th>Target Subs</th>
                            <th>Matched</th>
                            <th>Missing</th>
                            <th>Role Issues</th>
                            <th>Teams</th>
                          </tr>
                        </thead>
                        <tbody>
                          {uv.boardDetails.map((bd, i) => (
                            <tr key={i}>
                              <td><strong>{bd.boardName}</strong></td>
                              <td>
                                <span className={`badge ${bd.boardKind === 'public' ? 'bg-info' : bd.boardKind === 'share' ? 'bg-warning text-dark' : 'bg-secondary'}`} style={{fontSize: '0.65rem'}}>
                                  {bd.boardKind === 'public' ? 'Public' : bd.boardKind === 'share' ? 'Share' : 'Private'}
                                </span>
                              </td>
                              <td>{bd.sourceSubscriberCount}</td>
                              <td>{bd.targetSubscriberCount}</td>
                              <td className={bd.matchedSubscribers === bd.sourceSubscriberCount ? 'match-great' : ''}>
                                {bd.matchedSubscribers}/{bd.sourceSubscriberCount}
                              </td>
                              <td>
                                {bd.missingSubscribers.length > 0 ? (
                                  <span className="badge bg-danger" title={bd.missingSubscribers.map(u => u.name + (u.role === 'owner' ? ' (owner)' : '')).join(', ')}>
                                    {bd.missingSubscribers.length}
                                  </span>
                                ) : <span className="text-success">0</span>}
                              </td>
                              <td>
                                {bd.roleMismatches.length > 0 ? (
                                  <span className="badge bg-warning text-dark" title={bd.roleMismatches.map(u => u.name + ': ' + u.sourceRole + '→' + u.targetRole).join(', ')}>
                                    {bd.roleMismatches.length}
                                  </span>
                                ) : <span className="text-success">0</span>}
                              </td>
                              <td>
                                {bd.sourceTeamCount > 0 ? (
                                  <span>
                                    {bd.matchedTeams}/{bd.sourceTeamCount}
                                    {bd.missingTeams.length > 0 && (
                                      <span className="badge bg-warning text-dark ms-1" style={{fontSize: '0.6rem'}}
                                        title={bd.missingTeams.map(t => t.name).join(', ')}>
                                        -{bd.missingTeams.length}
                                      </span>
                                    )}
                                  </span>
                                ) : <span className="text-muted">—</span>}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
};

// ── User Migration Tab ──────────────────────────────────────────────────────

// ── People Column Population Section ─────────────────────────────────────────

const PeopleColumnSection = ({ sourceWs, targetWs, selectedTargetAccount, peopleStep, peopleValidation, peopleResult, onValidate, onExecute, onReset, show }) => {
  if (!show) return null;

  const v = peopleValidation; // shorthand
  const r = peopleResult;

  // Check if all users are mapped (no unmapped = safe to run)
  const allMapped = v && v.usersNotMapped.length === 0;
  const hasPeopleColumns = v && v.boardDetails.some(b => b.peopleColumnsFound > 0);

  return (
    <div className="card mt-4">
      <div className="card-header bg-light">
        <i className="bi bi-person-lines-fill me-2" />
        <strong>Populate People Columns</strong>
        <small className="text-muted ms-2">— Assign people to item columns after user activation</small>
      </div>
      <div className="card-body">
        {peopleStep === 'idle' && (
          <div>
            <p className="mb-3">
              People columns (Person, Team) are skipped during cross-account migration because user IDs differ between accounts.
              After users have been <strong>invited and activated</strong> in the target account, this tool maps and writes the correct user assignments.
            </p>
            <div className="alert alert-info mb-3">
              <i className="bi bi-info-circle me-1" />
              <strong>Prerequisites:</strong> Users must be active in the target Monday.com account. Run user migration (assign/invite) first, then ensure invitees have accepted their invitations.
            </div>
            <button className="btn btn-gw-primary" onClick={onValidate} disabled={!sourceWs || !targetWs}>
              <i className="bi bi-search me-1" />Validate & Preview
            </button>
          </div>
        )}

        {peopleStep === 'validating' && (
          <LoadingSpinner message="Scanning boards for people columns and validating user mapping..." />
        )}

        {peopleStep === 'ready' && v && (
          <div>
            {/* Validation Summary */}
            <div className="row g-3 mb-4">
              <div className="col-md-3"><StatCard value={v.boardsProcessed} label="Boards Scanned" icon="kanban" /></div>
              <div className="col-md-3"><StatCard value={v.itemsUpdated} label="Items to Update" icon="list-check" color="var(--gw-guidewire-blue)" /></div>
              <div className="col-md-3"><StatCard value={v.columnsUpdated} label="Column Values" icon="person-badge" color="var(--match-great)" /></div>
              <div className="col-md-3"><StatCard value={v.usersNotMapped.length} label="Unmapped Users" icon="person-x" color={v.usersNotMapped.length > 0 ? 'var(--match-poor)' : 'var(--match-great)'} /></div>
            </div>

            {/* Board Details */}
            {v.boardDetails.length > 0 && (
              <div className="card mb-3">
                <div className="card-header"><i className="bi bi-kanban me-1" /> Board Details</div>
                <div className="card-body p-0">
                  <div className="scrollable-table" style={{ maxHeight: '250px' }}>
                    <table className="table table-sm table-gw mb-0">
                      <thead>
                        <tr>
                          <th>Source Board</th>
                          <th>Target Board</th>
                          <th>People Cols</th>
                          <th>Items to Update</th>
                          <th>Column Values</th>
                          <th>Status</th>
                        </tr>
                      </thead>
                      <tbody>
                        {v.boardDetails.map((bd, i) => (
                          <tr key={i}>
                            <td><strong>{bd.sourceBoardName}</strong></td>
                            <td>{bd.targetBoardName}</td>
                            <td>{bd.peopleColumnsFound}</td>
                            <td>{bd.itemsUpdated}</td>
                            <td>{bd.columnsUpdated}</td>
                            <td>
                              {bd.errors.length > 0 ? (
                                <span className="badge bg-warning text-dark" title={bd.errors.join('; ')}>{bd.errors.length} issue(s)</span>
                              ) : bd.peopleColumnsFound === 0 ? (
                                <span className="text-muted">No people cols</span>
                              ) : bd.itemsUpdated > 0 ? (
                                <span className="text-success"><i className="bi bi-check-circle me-1" />Ready</span>
                              ) : (
                                <span className="text-muted">Nothing to update</span>
                              )}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* Unmapped Users Warning */}
            {v.usersNotMapped.length > 0 && (
              <div className="alert alert-warning mb-3">
                <i className="bi bi-exclamation-triangle me-1" />
                <strong>{v.usersNotMapped.length} user(s) could not be mapped</strong> — they may not exist or are not yet activated in the target account. Their people column assignments will be skipped.
                <div className="scrollable-table mt-2" style={{ maxHeight: '150px' }}>
                  <table className="table table-sm mb-0">
                    <thead><tr><th>Source User ID</th><th>Referenced In</th><th>Column</th></tr></thead>
                    <tbody>
                      {v.usersNotMapped.slice(0, 20).map((u, i) => (
                        <tr key={i}><td>{u.sourceUserId}</td><td>{u.item}</td><td>{u.column}</td></tr>
                      ))}
                      {v.usersNotMapped.length > 20 && <tr><td colSpan="3" className="text-muted">...and {v.usersNotMapped.length - 20} more</td></tr>}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {!hasPeopleColumns && (
              <div className="alert alert-info">
                <i className="bi bi-info-circle me-1" />
                No people columns found in the migrated boards. Nothing to populate.
              </div>
            )}

            {/* Action Buttons */}
            {hasPeopleColumns && v.itemsUpdated > 0 && (
              <div className="d-flex gap-2">
                <button className="btn btn-gw-primary" onClick={onExecute}>
                  <i className="bi bi-person-fill-check me-1" />Populate {v.itemsUpdated} Item(s)
                </button>
                <button className="btn btn-outline-secondary" onClick={onReset}>
                  <i className="bi bi-arrow-left me-1" />Back
                </button>
              </div>
            )}

            {hasPeopleColumns && v.itemsUpdated === 0 && (
              <div className="d-flex gap-2">
                <span className="text-muted align-self-center">No items need updating.</span>
                <button className="btn btn-outline-secondary" onClick={onReset}>
                  <i className="bi bi-arrow-left me-1" />Back
                </button>
              </div>
            )}
          </div>
        )}

        {peopleStep === 'running' && (
          <LoadingSpinner message="Writing people column values to target boards..." />
        )}

        {peopleStep === 'done' && r && (
          <div>
            <div className={`alert ${r.errors.length > 0 ? 'alert-warning' : 'alert-success'} mb-3`}>
              <i className={`bi ${r.errors.length > 0 ? 'bi-exclamation-triangle' : 'bi-check-circle-fill'} me-1`} />
              {r.errors.length > 0
                ? `People columns populated with ${r.errors.length} error(s).`
                : 'People columns populated successfully!'}
            </div>
            <div className="row g-3 mb-3">
              <div className="col-md-3"><StatCard value={r.boardsProcessed} label="Boards Processed" icon="kanban" /></div>
              <div className="col-md-3"><StatCard value={r.itemsUpdated} label="Items Updated" icon="list-check" color="var(--match-great)" /></div>
              <div className="col-md-3"><StatCard value={r.columnsUpdated} label="Values Written" icon="person-badge" color="var(--match-great)" /></div>
              <div className="col-md-3"><StatCard value={r.usersNotMapped.length} label="Unmapped Users" icon="person-x" color={r.usersNotMapped.length > 0 ? 'var(--match-poor)' : 'var(--match-great)'} /></div>
            </div>

            {r.errors.length > 0 && (
              <div className="alert alert-danger">
                <strong>Errors:</strong>
                <ul className="mb-0 mt-1">
                  {r.errors.slice(0, 10).map((e, i) => (
                    <li key={i}>{e.board}: {e.item || ''} — {e.error}</li>
                  ))}
                  {r.errors.length > 10 && <li>...and {r.errors.length - 10} more</li>}
                </ul>
              </div>
            )}

            <button className="btn btn-outline-secondary" onClick={onReset}>
              <i className="bi bi-arrow-repeat me-1" />Run Again
            </button>
          </div>
        )}
      </div>
    </div>
  );
};


const UserMigrationTab = () => {
  const toast = useToast();
  const [workspaces, setWorkspaces] = useState(window.initialWorkspaces || []);
  const [sourceWs, setSourceWs] = useState('');
  const [targetWs, setTargetWs] = useState('');
  const [selectedTargetAccount, setSelectedTargetAccount] = useState('');
  const [step, setStep] = useState('configure'); // configure | scanning | review | executing | done
  const [scanData, setScanData] = useState(null);
  const [scanLoading, setScanLoading] = useState(false);
  const [execLoading, setExecLoading] = useState(false);
  const [execResult, setExecResult] = useState(null);
  const [selectedUsers, setSelectedUsers] = useState({}); // userId → boolean
  const [selectAll, setSelectAll] = useState(true);
  const [filterType, setFilterType] = useState('all'); // all | members | guests
  const [savedMigrations, setSavedMigrations] = useState([]);

  // People column population state
  const [peopleStep, setPeopleStep] = useState('idle'); // idle | validating | ready | running | done
  const [peopleValidation, setPeopleValidation] = useState(null);
  const [peopleResult, setPeopleResult] = useState(null);
  const [peopleDryRun, setPeopleDryRun] = useState(true);

  useEffect(() => { loadData(); }, []);

  const loadData = async () => {
    try {
      const calls = [api.call('getSavedMigrations')];
      if (workspaces.length === 0) calls.unshift(api.call('getAccountInventory'));
      else calls.unshift(Promise.resolve(null));

      const [invResult, migResult] = await Promise.all(calls);
      if (invResult && invResult.success) {
        setWorkspaces((invResult.data.workspaces || []).sort((a, b) => a.name.localeCompare(b.name)));
      }
      if (migResult.success) setSavedMigrations(migResult.data || []);
    } catch (e) { toast.show(e.message, 'danger'); }
  };

  const runScan = async () => {
    if (!sourceWs || !targetWs) { toast.show('Select both workspaces', 'warning'); return; }
    setScanLoading(true);
    setScanData(null);
    try {
      const result = await api.call('scanUserMigration', sourceWs, targetWs, selectedTargetAccount || null);
      if (result.success) {
        setScanData(result.data);
        // Initialize all users as selected
        const sel = {};
        (result.data.users || []).forEach(u => { sel[u.sourceUserId] = true; });
        setSelectedUsers(sel);
        setSelectAll(true);
        setStep('review');
        toast.show('Scan complete!', 'success');
      } else {
        toast.show(result.error || 'Scan failed', 'danger');
      }
    } catch (e) { toast.show(e.message, 'danger'); }
    setScanLoading(false);
  };

  const toggleUser = (userId) => {
    setSelectedUsers(prev => {
      const next = { ...prev, [userId]: !prev[userId] };
      setSelectAll(Object.values(next).every(v => v));
      return next;
    });
  };

  const toggleSelectAll = () => {
    const newVal = !selectAll;
    setSelectAll(newVal);
    const sel = {};
    filteredUsers.forEach(u => { sel[u.sourceUserId] = newVal; });
    setSelectedUsers(prev => ({ ...prev, ...sel }));
  };

  const filteredUsers = useMemo(() => {
    if (!scanData) return [];
    return scanData.users.filter(u => {
      if (filterType === 'members') return !u.isGuest;
      if (filterType === 'guests') return u.isGuest;
      return true;
    });
  }, [scanData, filterType]);

  const selectedUserIds = useMemo(() => {
    return Object.entries(selectedUsers).filter(([, v]) => v).map(([k]) => k);
  }, [selectedUsers]);

  const executeMode = async (mode) => {
    if (selectedUserIds.length === 0 && mode !== 'validate') {
      toast.show('Select at least one user', 'warning');
      return;
    }
    setExecLoading(true);
    setStep('executing');
    try {
      const result = await api.call('executeUserMigration', {
        sourceWorkspaceId: sourceWs,
        targetWorkspaceId: targetWs,
        targetAccountId: selectedTargetAccount || null,
        mode: mode,
        userIds: selectedUserIds,
        scanData: scanData
      });
      if (result.success) {
        setExecResult(result.data);
        setStep('done');
        toast.show('User migration complete!', 'success');
      } else {
        toast.show(result.error || 'Execution failed', 'danger');
        setStep('review');
      }
    } catch (e) {
      toast.show(e.message, 'danger');
      setStep('review');
    }
    setExecLoading(false);
  };

  const resetAll = () => {
    setStep('configure');
    setScanData(null);
    setExecResult(null);
    setSelectedUsers({});
    setPeopleStep('idle');
    setPeopleValidation(null);
    setPeopleResult(null);
  };

  // ── People Column Population ──

  const validatePeopleColumns = async () => {
    if (!sourceWs || !targetWs) { toast.show('Select both workspaces first', 'warning'); return; }
    setPeopleStep('validating');
    setPeopleValidation(null);
    try {
      // Run a dry-run to validate: checks user mapping and finds people columns
      const result = await api.call('populatePeopleColumns', {
        sourceWorkspaceId: sourceWs,
        targetWorkspaceId: targetWs,
        targetAccountId: selectedTargetAccount || null,
        dryRun: true
      });
      if (result.success) {
        setPeopleValidation(result.data);
        setPeopleStep('ready');
      } else {
        toast.show(result.error || 'Validation failed', 'danger');
        setPeopleStep('idle');
      }
    } catch (e) {
      toast.show(e.message, 'danger');
      setPeopleStep('idle');
    }
  };

  const executePeopleColumns = async () => {
    if (!sourceWs || !targetWs) return;
    setPeopleStep('running');
    try {
      const result = await api.call('populatePeopleColumns', {
        sourceWorkspaceId: sourceWs,
        targetWorkspaceId: targetWs,
        targetAccountId: selectedTargetAccount || null,
        dryRun: false
      });
      if (result.success) {
        setPeopleResult(result.data);
        setPeopleStep('done');
        toast.show('People columns populated!', 'success');
      } else {
        toast.show(result.error || 'Population failed', 'danger');
        setPeopleStep('ready');
      }
    } catch (e) {
      toast.show(e.message, 'danger');
      setPeopleStep('ready');
    }
  };

  return (
    <div>
      <h4 className="mb-1"><i className="bi bi-people-fill me-2" />User & Guest Migration</h4>
      <p className="text-muted mb-4">Assign users and guests to a previously migrated workspace. Supports same-account and cross-account.</p>

      {/* Step Indicator */}
      <div className="d-flex mb-4 gap-2">
        {['configure', 'review', 'done'].map((s, i) => {
          const labels = { configure: 'Select Workspaces', review: 'Review & Execute', done: 'Complete' };
          const active = step === s || (step === 'scanning' && s === 'configure') || (step === 'executing' && s === 'review');
          return (
            <div key={s} className={`flex-fill text-center py-2 rounded ${active ? 'bg-primary text-white' : 'bg-light text-muted'}`}>
              <small><strong>{i + 1}.</strong> {labels[s]}</small>
            </div>
          );
        })}
      </div>

      {/* Step 1: Configure */}
      {(step === 'configure' || step === 'scanning') && (
        <div>
          <div className="row g-3 mb-4">
            <div className="col-md-5">
              <div className="card">
                <div className="card-header"><i className="bi bi-building me-1" /> Source Workspace (Original)</div>
                <div className="card-body">
                  <select className="form-select" value={sourceWs} onChange={e => setSourceWs(e.target.value)}>
                    <option value="">Select source workspace...</option>
                    {workspaces.map(ws => <option key={ws.id} value={ws.id}>{ws.name}</option>)}
                  </select>
                </div>
              </div>
            </div>
            <div className="col-md-2 d-flex align-items-center justify-content-center">
              <i className="bi bi-arrow-right fs-3 text-muted" />
            </div>
            <div className="col-md-5">
              <div className="card">
                <div className="card-header"><i className="bi bi-building-check me-1" /> Target Workspace (Migrated)</div>
                <div className="card-body">
                  <select className="form-select" value={targetWs} onChange={e => setTargetWs(e.target.value)}>
                    <option value="">Select target workspace...</option>
                    {workspaces.map(ws => <option key={ws.id} value={ws.id}>{ws.name}</option>)}
                  </select>
                </div>
              </div>
            </div>
          </div>

          <div className="mb-4">
            <TargetAccountSelector
              selectedAccountId={selectedTargetAccount}
              onAccountChange={setSelectedTargetAccount}
              label="Target Monday.com Account"
            />
          </div>

          <div className="text-center">
            <button className="btn btn-gw-primary btn-lg" onClick={runScan} disabled={!sourceWs || !targetWs || scanLoading}>
              {scanLoading ? <><span className="spinner-border spinner-border-sm me-1" />Scanning...</> : <><i className="bi bi-search me-1" />Scan & Compare</>}
            </button>
          </div>

          {scanLoading && <LoadingSpinner message="Scanning workspaces and comparing users..." />}
        </div>
      )}

      {/* Step 2: Review & Execute */}
      {(step === 'review' || step === 'executing') && scanData && (
        <div>
          {/* Summary Cards */}
          <div className="row g-3 mb-4">
            <div className="col-md-2"><StatCard value={scanData.summary.totalSourceUsers} label="Source Users" icon="people" /></div>
            <div className="col-md-2"><StatCard value={scanData.summary.members} label="Members" icon="person-badge" color="var(--match-great)" /></div>
            <div className="col-md-2"><StatCard value={scanData.summary.guests} label="Guests" icon="person-dash" color="var(--gw-orange)" /></div>
            <div className="col-md-2"><StatCard value={scanData.summary.matchedInTarget} label="Matched" icon="check-circle" color="var(--match-great)" /></div>
            <div className="col-md-2"><StatCard value={scanData.summary.unmatchedInTarget} label="Not in Target" icon="x-circle" color="var(--match-poor)" /></div>
            <div className="col-md-2"><StatCard value={`${scanData.summary.boardsMatched}/${scanData.summary.boardsTotal}`} label="Boards Matched" icon="kanban" /></div>
          </div>

          {scanData.isCrossAccount && (
            <div className="alert alert-warning mb-3">
              <i className="bi bi-exclamation-triangle me-1" />
              <strong>Cross-account migration detected.</strong> Users are matched by email address. Only users already in the target account can be directly assigned.
            </div>
          )}

          {/* Board Mapping Table */}
          <div className="card mb-4">
            <div className="card-header"><i className="bi bi-kanban me-1" /> Board Mapping & Subscribers</div>
            <div className="card-body">
              <div className="scrollable-table" style={{ maxHeight: '400px' }}>
                <table className="table table-gw table-sm mb-0">
                  <thead>
                    <tr>
                      <th>Source Board</th>
                      <th>Kind</th>
                      <th>Target Board</th>
                      <th>Matched</th>
                      <th>Teams</th>
                      <th>Individuals</th>
                      <th>Missing</th>
                      <th>Groups</th>
                    </tr>
                  </thead>
                  <tbody>
                    {scanData.boardMapping.map((bm, i) => (
                      <tr key={i}>
                        <td><strong>{bm.sourceBoardName}</strong></td>
                        <td>
                          <span className={`badge ${bm.sourceKind === 'public' ? 'bg-info' : bm.sourceKind === 'share' ? 'bg-warning text-dark' : 'bg-secondary'}`}>
                            {bm.sourceKind === 'public' ? 'Public' : bm.sourceKind === 'share' ? 'Shareable' : 'Private'}
                          </span>
                        </td>
                        <td>{bm.targetBoardName || <span className="text-danger">Not found</span>}</td>
                        <td>{bm.matched ? <span className="match-great"><i className="bi bi-check-circle" /></span> : <span className="match-poor"><i className="bi bi-x-circle" /></span>}</td>
                        <td>
                          {(bm.sourceTeams || []).length > 0 ? (
                            <span title={(bm.sourceTeams || []).map(t => t.name + (t.isOwner ? ' (owner)' : '') + ' [' + t.memberCount + ']').join(', ')}>
                              {(bm.sourceTeams || []).map((t, ti) => (
                                <span key={ti} className={`badge ${t.isOwner ? 'bg-primary' : 'bg-outline-secondary border'} me-1 mb-1`} style={{fontSize: '0.7rem'}}>
                                  <i className="bi bi-people-fill me-1" />{t.name}
                                  <span className="ms-1 opacity-75">({t.memberCount})</span>
                                </span>
                              ))}
                              {(bm.missingTeams || []).length > 0 && (
                                <span className="badge bg-warning text-dark ms-1" style={{fontSize: '0.65rem'}}>
                                  {bm.missingTeams.length} missing
                                </span>
                              )}
                            </span>
                          ) : <span className="text-muted">—</span>}
                        </td>
                        <td>
                          {bm.sourceSubscriberCount}
                          {bm.sourceKind === 'public' && <small className="text-muted ms-1" title="Public boards show only owners as individuals">(owners)</small>}
                          {bm.matched && <span className="text-muted"> / {bm.targetSubscriberCount}</span>}
                        </td>
                        <td>{bm.missingSubscribers.length > 0 ? <span className="badge bg-warning text-dark">{bm.missingSubscribers.length}</span> : <span className="text-success">0</span>}</td>
                        <td>{bm.sourceGroupCount} / {bm.targetGroupCount}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          {/* User List */}
          <div className="card mb-4">
            <div className="card-header d-flex justify-content-between align-items-center">
              <span><i className="bi bi-people me-1" /> Users to Migrate</span>
              <div className="d-flex gap-2 align-items-center">
                <div className="btn-group btn-group-sm">
                  <button className={`btn ${filterType === 'all' ? 'btn-primary' : 'btn-outline-primary'}`} onClick={() => setFilterType('all')}>All</button>
                  <button className={`btn ${filterType === 'members' ? 'btn-primary' : 'btn-outline-primary'}`} onClick={() => setFilterType('members')}>Members</button>
                  <button className={`btn ${filterType === 'guests' ? 'btn-primary' : 'btn-outline-primary'}`} onClick={() => setFilterType('guests')}>Guests</button>
                </div>
                <span className="badge bg-secondary">{filteredUsers.length} users</span>
              </div>
            </div>
            <div className="card-body">
              <div className="scrollable-table" style={{ maxHeight: '400px' }}>
                <table className="table table-gw table-sm mb-0">
                  <thead>
                    <tr>
                      <th><input type="checkbox" checked={selectAll} onChange={toggleSelectAll} /></th>
                      <th>Name</th>
                      <th>Email</th>
                      <th>Type</th>
                      <th>WS Role</th>
                      <th>Access Via</th>
                      <th>Target Match</th>
                      <th>In Target Acct</th>
                      <th>Boards</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredUsers.map(u => (
                      <tr key={u.sourceUserId} className={!selectedUsers[u.sourceUserId] ? 'text-muted' : ''}>
                        <td><input type="checkbox" checked={!!selectedUsers[u.sourceUserId]} onChange={() => toggleUser(u.sourceUserId)} /></td>
                        <td>{u.name}</td>
                        <td><small>{u.email}</small></td>
                        <td><span className={`badge ${u.isGuest ? 'bg-warning text-dark' : 'bg-info text-white'}`}>{u.isGuest ? 'Guest' : 'Member'}</span></td>
                        <td>
                          {u.wsRole === 'owner' ? <span className="badge bg-primary">Owner</span> :
                           u.wsRole === 'subscriber' ? <span className="badge bg-secondary">Subscriber</span> :
                           <span className="text-muted">—</span>}
                        </td>
                        <td>
                          {u.viaTeams && u.viaTeams.length > 0 ? (
                            <span>
                              {u.viaTeams.map((t, ti) => (
                                <span key={ti} className="badge bg-outline-secondary border me-1" style={{fontSize: '0.7rem'}}>
                                  <i className="bi bi-people-fill me-1" />{t}
                                </span>
                              ))}
                            </span>
                          ) : (
                            <span className="text-muted" style={{fontSize: '0.75rem'}}>Individual</span>
                          )}
                        </td>
                        <td>
                          {u.targetUserId ? (
                            <span className="text-success"><i className="bi bi-check-circle me-1" />{scanData.isCrossAccount ? 'Email match' : 'Same ID'}</span>
                          ) : (
                            <span className="text-danger"><i className="bi bi-x-circle me-1" />Not found</span>
                          )}
                        </td>
                        <td>{u.inTargetAccount ? <i className="bi bi-check text-success" /> : <i className="bi bi-x text-danger" />}</td>
                        <td>
                          <span className={u.assignedBoardCount === u.boardCount && u.boardCount > 0 ? 'text-success' : u.assignedBoardCount > 0 ? 'text-warning' : ''}>
                            {u.assignedBoardCount}/{u.boardCount}
                          </span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          {/* Action Buttons */}
          <div className="card mb-4">
            <div className="card-header"><i className="bi bi-lightning me-1" /> Actions</div>
            <div className="card-body">
              {!scanData.isCrossAccount ? (
                <div>
                  <p className="mb-3">
                    <strong>Same-account migration:</strong> Selected users will be directly added to the target workspace and their matching boards.
                    No invitation emails will be sent.
                  </p>
                  <div className="d-flex gap-2">
                    <button className="btn btn-gw-primary" onClick={() => executeMode('assign_existing')} disabled={execLoading || selectedUserIds.length === 0}>
                      <i className="bi bi-person-plus me-1" />Assign {selectedUserIds.length} User(s) to Target
                    </button>
                    <button className="btn btn-outline-secondary" onClick={resetAll}>
                      <i className="bi bi-arrow-left me-1" />Back
                    </button>
                  </div>
                </div>
              ) : (
                <div>
                  <p className="mb-3">
                    <strong>Cross-account migration:</strong> Choose how to handle users in the target account.
                  </p>
                  <div className="row g-3">
                    <div className="col-md-6">
                      <div className="card h-100">
                        <div className="card-body">
                          <h6><i className="bi bi-eye me-1" />Validate Only</h6>
                          <p className="small text-muted">Show which users exist in the target. No changes made.</p>
                          <button className="btn btn-outline-info btn-sm" onClick={() => executeMode('validate')} disabled={execLoading}>
                            <i className="bi bi-search me-1" />Validate
                          </button>
                        </div>
                      </div>
                    </div>
                    <div className="col-md-6">
                      <div className="card h-100">
                        <div className="card-body">
                          <h6><i className="bi bi-person-check me-1" />Assign Existing Only</h6>
                          <p className="small text-muted">Assign users already in the target account to matching boards. No invites sent.</p>
                          <button className="btn btn-gw-primary btn-sm" onClick={() => executeMode('assign_existing')} disabled={execLoading || selectedUserIds.length === 0}>
                            <i className="bi bi-person-plus me-1" />Assign Existing ({scanData.summary.matchedInTarget})
                          </button>
                        </div>
                      </div>
                    </div>
                    <div className="col-md-6">
                      <div className="card h-100">
                        <div className="card-body">
                          <h6><i className="bi bi-envelope me-1" />Invite Members</h6>
                          <p className="small text-muted">Invite non-guest users not yet in the target account. <strong>Sends invitation emails.</strong></p>
                          <button className="btn btn-warning btn-sm" onClick={() => executeMode('invite_users')} disabled={execLoading || scanData.summary.unmatchedInTarget === 0}>
                            <i className="bi bi-send me-1" />Invite Members
                          </button>
                        </div>
                      </div>
                    </div>
                    <div className="col-md-6">
                      <div className="card h-100">
                        <div className="card-body">
                          <h6><i className="bi bi-person-plus-fill me-1" />Invite Guests</h6>
                          <p className="small text-muted">Invite guest users not yet in the target account. <strong>Sends invitation emails.</strong></p>
                          <button className="btn btn-danger btn-sm" onClick={() => executeMode('invite_guests')} disabled={execLoading || scanData.summary.unmatchedInTarget === 0}>
                            <i className="bi bi-send me-1" />Invite Guests
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div className="mt-3">
                    <button className="btn btn-outline-secondary" onClick={resetAll}>
                      <i className="bi bi-arrow-left me-1" />Back
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>

          {execLoading && <LoadingSpinner message="Executing user migration..." />}
        </div>
      )}

      {/* Step 3: Done */}
      {step === 'done' && execResult && (
        <div className="card">
          <div className={`card-header ${execResult.errors.length > 0 ? 'bg-warning' : 'bg-success'} text-white`}>
            <i className={`bi ${execResult.errors.length > 0 ? 'bi-exclamation-triangle' : 'bi-check-circle'} me-1`} />
            {execResult.errors.length > 0 ? 'User Migration Completed with Issues' : 'User Migration Complete'}
          </div>
          <div className="card-body">
            <div className="row g-3 mb-4">
              <div className="col-md-3"><StatCard value={execResult.usersProcessed} label="Users Processed" icon="people" /></div>
              <div className="col-md-3"><StatCard value={execResult.usersAssigned} label="Users Assigned" icon="person-check" color="var(--match-great)" /></div>
              <div className="col-md-3"><StatCard value={execResult.usersInvited} label="Users Invited" icon="envelope" color="var(--gw-orange)" /></div>
              <div className="col-md-3"><StatCard value={execResult.errors.length} label="Errors" icon="exclamation-triangle" color="var(--match-poor)" /></div>
            </div>

            <p><strong>Mode:</strong> <span className="badge bg-info">{execResult.mode.replace(/_/g, ' ')}</span></p>
            <p><strong>Boards Processed:</strong> {execResult.boardsProcessed}</p>

            {execResult.details.length > 0 && (
              <div className="card mb-3">
                <div className="card-header"><i className="bi bi-list-check me-1" /> Details</div>
                <div className="card-body">
                  <div className="scrollable-table" style={{ maxHeight: '200px' }}>
                    <table className="table table-sm mb-0">
                      <thead><tr><th>Board</th><th>Action</th><th>Count</th></tr></thead>
                      <tbody>
                        {execResult.details.map((d, i) => (
                          <tr key={i}>
                            <td>{d.board}</td>
                            <td><span className="badge bg-secondary">{d.action}</span></td>
                            <td>{d.count}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {execResult.errors.length > 0 && (
              <div className="alert alert-danger">
                <strong>Errors ({execResult.errors.length}):</strong>
                <ul className="mb-0 mt-1">
                  {execResult.errors.slice(0, 10).map((e, i) => (
                    <li key={i}>{e.board || e.email || e.action}: {e.error}</li>
                  ))}
                  {execResult.errors.length > 10 && <li>...and {execResult.errors.length - 10} more</li>}
                </ul>
              </div>
            )}

            <div className="mt-4 text-center">
              <button className="btn btn-gw-primary" onClick={resetAll}>
                <i className="bi bi-arrow-repeat me-1" />Start New User Migration
              </button>
            </div>
          </div>
        </div>
      )}

      {/* People Column Population — shown after user migration or from configure */}
      <PeopleColumnSection
        sourceWs={sourceWs}
        targetWs={targetWs}
        selectedTargetAccount={selectedTargetAccount}
        peopleStep={peopleStep}
        peopleValidation={peopleValidation}
        peopleResult={peopleResult}
        peopleDryRun={peopleDryRun}
        onValidate={validatePeopleColumns}
        onExecute={executePeopleColumns}
        onReset={() => { setPeopleStep('idle'); setPeopleValidation(null); setPeopleResult(null); }}
        show={step === 'done' || (step === 'configure' && sourceWs && targetWs)}
      />
    </div>
  );
};
