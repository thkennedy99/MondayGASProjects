<style>
  /* ── Guidewire Theme Variables ─────────────────────────────────────────── */
  :root {
    --gw-guidewire-blue: #00739d;
    --gw-nautical-navy: #034e6a;
    --gw-bright-blue: #1eb7df;
    --gw-light-blue: #e7f1f5;
    --gw-orange: #ff6900;
    --gw-gray: #6c757d;

    --text-primary: #212529;
    --text-secondary: #6c757d;
    --text-muted: #adb5bd;
    --bg-primary: #ffffff;
    --bg-secondary: #f8f9fa;
    --bg-card: #ffffff;
    --border-color: #dee2e6;
    --shadow-sm: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
    --shadow-md: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
    --hover-lift: translateY(-2px);

    --match-great: #00c875;
    --match-good: #fdab3d;
    --match-poor: #e2445c;
    --match-neutral: #c4c4c4;
  }

  [data-bs-theme="dark"] {
    --gw-guidewire-blue: #1eb7df;
    --gw-nautical-navy: #005570;
    --gw-bright-blue: #5fcae6;
    --gw-light-blue: #2a3f47;

    --text-primary: #f8f9fa;
    --text-secondary: #adb5bd;
    --text-muted: #6c757d;
    --bg-primary: #1a1a1a;
    --bg-secondary: #212529;
    --bg-card: #2a2a2a;
    --border-color: #3a3a3a;
    --shadow-sm: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.3);
    --shadow-md: 0 0.5rem 1rem rgba(0, 0, 0, 0.4);
  }

  /* ── Base ───────────────────────────────────────────────────────────────── */
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg-secondary);
    color: var(--text-primary);
    transition: background-color 0.3s ease, color 0.3s ease;
    margin: 0;
    padding: 0;
  }

  /* ── Navbar ─────────────────────────────────────────────────────────────── */
  .navbar-brand-gw {
    font-weight: 700;
    font-size: 1.1rem;
    color: #fff !important;
  }

  .navbar-gw {
    background: linear-gradient(135deg, var(--gw-nautical-navy), var(--gw-guidewire-blue));
    box-shadow: var(--shadow-sm);
  }

  .version-badge {
    font-size: 0.7rem;
    vertical-align: super;
    opacity: 0.7;
    margin-left: 4px;
  }

  /* ── Cards ──────────────────────────────────────────────────────────────── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 0.5rem;
    box-shadow: var(--shadow-sm);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .card:hover {
    transform: var(--hover-lift);
    box-shadow: var(--shadow-md);
  }

  .card-header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    font-weight: 600;
  }

  /* ── Stat Cards ─────────────────────────────────────────────────────────── */
  .stat-card {
    text-align: center;
    padding: 1.25rem;
  }

  .stat-card .stat-value {
    font-size: 2rem;
    font-weight: 700;
    color: var(--gw-guidewire-blue);
    line-height: 1.2;
  }

  .stat-card .stat-label {
    font-size: 0.85rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 0.25rem;
  }

  /* ── Match Indicators ───────────────────────────────────────────────────── */
  .match-great { color: var(--match-great); }
  .match-good { color: var(--match-good); }
  .match-poor { color: var(--match-poor); }
  .match-neutral { color: var(--match-neutral); }

  .match-badge-great { background: var(--match-great); color: #fff; }
  .match-badge-good { background: var(--match-good); color: #000; }
  .match-badge-poor { background: var(--match-poor); color: #fff; }

  .match-ring {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: 700;
    margin: 0 auto;
    border: 4px solid;
  }

  .match-ring.great { border-color: var(--match-great); color: var(--match-great); }
  .match-ring.good { border-color: var(--match-good); color: var(--match-good); }
  .match-ring.poor { border-color: var(--match-poor); color: var(--match-poor); }

  /* ── Tabs ────────────────────────────────────────────────────────────────── */
  .nav-tabs .nav-link {
    color: var(--text-secondary);
    font-weight: 500;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 0.75rem 1.25rem;
    transition: all 0.2s;
  }

  .nav-tabs .nav-link:hover {
    color: var(--gw-guidewire-blue);
    border-bottom-color: rgba(0, 115, 157, 0.3);
  }

  .nav-tabs .nav-link.active {
    color: var(--gw-guidewire-blue);
    background: transparent;
    border-bottom-color: var(--gw-guidewire-blue);
  }

  /* ── Tables ─────────────────────────────────────────────────────────────── */
  .table-gw {
    font-size: 0.9rem;
  }

  .table-gw thead th {
    background: var(--bg-secondary);
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 2px solid var(--border-color);
    position: sticky;
    top: 0;
    z-index: 5;
  }

  .table-gw tbody tr {
    transition: background-color 0.15s;
  }

  .table-gw tbody tr:hover {
    background: var(--gw-light-blue);
  }

  .scrollable-table {
    max-height: 400px;
    overflow-y: auto;
    border: 1px solid var(--border-color);
    border-radius: 0.375rem;
  }

  /* ── Buttons ────────────────────────────────────────────────────────────── */
  .btn-gw-primary {
    background: var(--gw-guidewire-blue);
    border-color: var(--gw-guidewire-blue);
    color: #fff;
  }

  .btn-gw-primary:hover {
    background: var(--gw-nautical-navy);
    border-color: var(--gw-nautical-navy);
    color: #fff;
  }

  .btn-gw-orange {
    background: var(--gw-orange);
    border-color: var(--gw-orange);
    color: #fff;
  }

  .btn-gw-orange:hover {
    background: #e05e00;
    border-color: #e05e00;
    color: #fff;
  }

  /* ── Workspace Card ─────────────────────────────────────────────────────── */
  .workspace-card {
    cursor: pointer;
    border-left: 4px solid transparent;
    transition: all 0.2s;
  }

  .workspace-card:hover {
    border-left-color: var(--gw-guidewire-blue);
  }

  .workspace-card.selected {
    border-left-color: var(--gw-orange);
    background: var(--gw-light-blue);
  }

  /* ── Progress ───────────────────────────────────────────────────────────── */
  .migration-progress .progress {
    height: 28px;
    border-radius: 0.5rem;
  }

  .migration-progress .progress-bar {
    transition: width 0.5s ease;
    font-weight: 600;
  }

  /* ── Status Badges ──────────────────────────────────────────────────────── */
  .badge.status-success { background: var(--match-great); color: #fff; }
  .badge.status-error { background: var(--match-poor); color: #fff; }
  .badge.status-running { background: var(--gw-bright-blue); color: #fff; }
  .badge.status-pending { background: var(--match-neutral); color: #000; }

  /* ── Loading Spinner ────────────────────────────────────────────────────── */
  .loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }

  .loading-card {
    background: var(--bg-card);
    padding: 2rem 3rem;
    border-radius: 1rem;
    text-align: center;
    box-shadow: var(--shadow-md);
  }

  /* ── Comparison Grid ────────────────────────────────────────────────────── */
  .comparison-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 1rem;
    align-items: center;
    padding: 0.75rem 0;
    border-bottom: 1px solid var(--border-color);
  }

  .comparison-row .source-val,
  .comparison-row .target-val {
    font-size: 1.25rem;
    font-weight: 600;
    text-align: center;
  }

  .comparison-row .vs-indicator {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* ── Empty States ───────────────────────────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
  }

  .empty-state i {
    font-size: 3rem;
    margin-bottom: 1rem;
    display: block;
  }

  /* ── Dark Mode Toggle ───────────────────────────────────────────────────── */
  .theme-toggle {
    cursor: pointer;
    background: none;
    border: none;
    color: rgba(255, 255, 255, 0.8);
    font-size: 1.1rem;
    padding: 0.25rem 0.5rem;
    transition: color 0.2s;
  }

  .theme-toggle:hover {
    color: #fff;
  }

  /* ── Responsive ─────────────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    .stat-card .stat-value {
      font-size: 1.5rem;
    }

    .comparison-row {
      grid-template-columns: 1fr;
      text-align: center;
    }

    .comparison-row .vs-indicator {
      display: none;
    }

    .nav-tabs .nav-link {
      padding: 0.5rem 0.75rem;
      font-size: 0.85rem;
    }
  }

  /* ── Scrollbar ──────────────────────────────────────────────────────────── */
  .scrollable-table::-webkit-scrollbar {
    width: 6px;
  }

  .scrollable-table::-webkit-scrollbar-track {
    background: var(--bg-secondary);
  }

  .scrollable-table::-webkit-scrollbar-thumb {
    background: var(--gw-gray);
    border-radius: 3px;
  }

  .scrollable-table::-webkit-scrollbar-thumb:hover {
    background: var(--gw-guidewire-blue);
  }

  /* ── Toast Container ────────────────────────────────────────────────────── */
  .toast-container {
    z-index: 10000;
  }
</style>
