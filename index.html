    <!-- Custom Styles -->

            --bs-warning: #ffcc33;

            --bs-light: #3a3a3a;

            /* Link Colors */

            --bs-link-hover-color: #5fcae6;
            --bs-link-color-rgb: 30, 183, 223;
            --bs-link-hover-color-rgb: 95, 202, 230;

            /* Theme variables */

</head>
<body>
    <div id="root"></div>
    
    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Application Configuration -->
    <script>
        window.appConfig = <?!= appConfig ?>;
    </script>
    
    <!-- Main React Application -->
    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef, createContext, useContext } = React;
        const { createRoot } = ReactDOM;
        
        // Google Script API wrapper
        const api = {
            call: (functionName, ...args) => {
                return new Promise((resolve, reject) => {
                    google.script.run
                        .withSuccessHandler(resolve)
                        .withFailureHandler(reject)
                        [functionName](...args);
                });
            }
        };
        
        // App Context
        const AppContext = createContext();
        
        // Status Badge Component
        const StatusBadge = ({ status, type = 'activity' }) => {
            const getStatusClass = () => {
                const statusLower = status?.toLowerCase() || '';
                if (statusLower.includes('done') || statusLower.includes('complete')) return 'status-done';
                if (statusLower.includes('working') || statusLower.includes('progress')) return 'status-working';
                if (statusLower.includes('stuck') || statusLower.includes('blocked')) return 'status-stuck';
                if (statusLower.includes('not started')) return 'status-not-started';
                if (statusLower.includes('high')) return 'status-high';
                if (statusLower.includes('medium')) return 'status-medium';
                if (statusLower.includes('low')) return 'status-low';
                return 'secondary';
            };
            
            return (
                <span className={`badge ${getStatusClass()}`}>
                    {status}
                </span>
            );
        };

        // Helper function to format dates without timezone issues
        const formatDate = (dateStr) => {
            if (!dateStr) return '-';
            // If it's already in YYYY-MM-DD format, convert to locale format
            const match = String(dateStr).match(/^(\d{4})-(\d{2})-(\d{2})/);
            if (match) {
                const [, year, month, day] = match;
                // Create date using local timezone by specifying year, month, day separately
                const date = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
                return date.toLocaleDateString();
            }
            return dateStr;
        };

        // Data Table Component
        const DataTable = ({ data, columns, onRowClick, loading }) => {
            if (loading) {
                return (
                    <div className="loading-spinner">
                        <div className="spinner-border text-primary" role="status">
                            <span className="visually-hidden">Loading...</span>
                        </div>
                    </div>
                );
            }
            
            if (!data || data.length === 0) {
                return (
                    <div className="text-center p-4 text-muted">
                        No data available
                    </div>
                );
            }
            
            return (
                <div className="table-responsive">
                    <table className="table table-hover data-table mb-0">
                        <thead>
                            <tr>
                                {columns.map(col => (
                                    <th key={col.field} style={{ width: col.width }}>
                                        {col.name}
                                    </th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {data.map((row, index) => (
                                <tr key={index} onClick={() => onRowClick && onRowClick(row)}>
                                    {columns.map(col => (
                                        <td key={col.field}>
                                            {col.type === 'status' ? (
                                                <StatusBadge status={row[col.field]} />
                                            ) : col.type === 'date' ? (
                                                formatDate(row[col.field])
                                            ) : (
                                                row[col.field] || '-'
                                            )}
                                        </td>
                                    ))}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };
        
       

        // Reusable ScrollableDataTable component
            function ScrollableDataTable({ 
              data, 
              columns, 
              renderRow, 
              title, 
              emptyMessage = "No data available",
              maxHeight = "400px",
              itemsPerPage = 10,
              searchable = true,
              searchFields = []
            }) {
              const [displayData, setDisplayData] = React.useState([]);
              const [currentPage, setCurrentPage] = React.useState(1);
              const [searchTerm, setSearchTerm] = React.useState('');
              const [sortConfig, setSortConfig] = React.useState({ key: null, direction: 'asc' });
              
              // Filter data based on search term
              const filteredData = React.useMemo(() => {
                if (!searchTerm) return data;
                
                return data.filter(item => {
                  const searchLower = searchTerm.toLowerCase();
                  // Search in specified fields or all string fields
                  if (searchFields.length > 0) {
                    return searchFields.some(field => 
                      String(item[field] || '').toLowerCase().includes(searchLower)
                    );
                  }
                  // Search in all string values
                  return Object.values(item).some(value => 
                    String(value || '').toLowerCase().includes(searchLower)
                  );
                });
              }, [data, searchTerm, searchFields]);
              
              // Sort data
              const sortedData = React.useMemo(() => {
                if (!sortConfig.key) return filteredData;
                
                return [...filteredData].sort((a, b) => {
                  const aVal = a[sortConfig.key] || '';
                  const bVal = b[sortConfig.key] || '';
                  
                  if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
                  if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
                  return 0;
                });
              }, [filteredData, sortConfig]);
              
              // Paginate data
              React.useEffect(() => {
                const startIndex = (currentPage - 1) * itemsPerPage;
                const endIndex = startIndex + itemsPerPage;
                setDisplayData(sortedData.slice(startIndex, endIndex));
              }, [sortedData, currentPage, itemsPerPage]);
              
              const totalPages = Math.ceil(sortedData.length / itemsPerPage);
              
              const handleSort = (key) => {
                setSortConfig(prev => ({
                  key,
                  direction: prev.key === key && prev.direction === 'asc' ? 'desc' : 'asc'
                }));
              };
              
              const getSortIcon = (columnKey) => {
                if (sortConfig.key !== columnKey) {
                  return <i className="bi bi-arrow-down-up text-muted"></i>;
                }
                return sortConfig.direction === 'asc' 
                  ? <i className="bi bi-sort-up"></i>
                  : <i className="bi bi-sort-down"></i>;
              };
              
              return (
                <div className="scrollable-data-container">
                  {/* Header with search and info */}
                  <div className="d-flex justify-content-between align-items-center mb-3">
                    <div className="d-flex align-items-center gap-2">
                      <h6 className="mb-0">{title}</h6>
                    </div>
                    
                    {searchable && (
                      <div className="input-group input-group-sm" style={{ width: '250px' }}>
                        <span className="input-group-text">
                          <i className="bi bi-search"></i>
                        </span>
                        <input
                          type="text"
                          className="form-control"
                          placeholder="Search..."
                          value={searchTerm}
                          onChange={(e) => {
                            setSearchTerm(e.target.value);
                            setCurrentPage(1); // Reset to first page on search
                          }}
                        />
                        {searchTerm && (
                          <button 
                            className="btn btn-outline-secondary"
                            onClick={() => {
                              setSearchTerm('');
                              setCurrentPage(1);
                            }}
                          >
                            <i className="bi bi-x"></i>
                          </button>
                        )}
                      </div>
                    )}
                  </div>
                  
                  {/* Scrollable table container */}
                  <div 
                    className="table-container border rounded" 
                    style={{ 
                      maxHeight: maxHeight, 
                      overflowY: 'auto',
                      overflowX: 'auto'
                    }}
                  >
                    {displayData.length === 0 ? (
                      <div className="text-center text-muted py-4">
                        {searchTerm ? `No results found for "${searchTerm}"` : emptyMessage}
                      </div>
                    ) : (
                      <table className="table table-hover table-sm mb-0">
                        <thead className="sticky-top bg-light">
                          <tr>
                            {columns.map((column, index) => (
                              <th 
                                key={index} 
                                className="cursor-pointer user-select-none"
                                onClick={() => handleSort(column.key)}
                              >
                                <div className="d-flex align-items-center gap-1">
                                  {column.label}
                                  {getSortIcon(column.key)}
                                </div>
                              </th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {displayData.map((item, index) => renderRow(item, index))}
                        </tbody>
                      </table>
                    )}
                  </div>
                  
                  {/* Pagination controls */}
                  {totalPages > 1 && (
                    <div className="d-flex justify-content-between align-items-center mt-3">
                      <div className="text-muted small">
                        Showing {((currentPage - 1) * itemsPerPage) + 1} - {Math.min(currentPage * itemsPerPage, sortedData.length)} of {sortedData.length}
                      </div>
                      
                      <div className="btn-group btn-group-sm">
                        <button 
                          className="btn btn-outline-secondary"
                          onClick={() => setCurrentPage(1)}
                          disabled={currentPage === 1}
                        >
                          <i className="bi bi-chevron-double-left"></i>
                        </button>
                        <button 
                          className="btn btn-outline-secondary"
                          onClick={() => setCurrentPage(prev => Math.max(1, prev - 1))}
                          disabled={currentPage === 1}
                        >
                          <i className="bi bi-chevron-left"></i>
                        </button>
                        
                        {/* Page numbers */}
                        {[...Array(Math.min(5, totalPages))].map((_, i) => {
                          let pageNum;
                          if (totalPages <= 5) {
                            pageNum = i + 1;
                          } else if (currentPage <= 3) {
                            pageNum = i + 1;
                          } else if (currentPage >= totalPages - 2) {
                            pageNum = totalPages - 4 + i;
                          } else {
                            pageNum = currentPage - 2 + i;
                          }
                          
                          return (
                            <button
                              key={i}
                              className={`btn ${pageNum === currentPage ? 'btn-primary' : 'btn-outline-secondary'}`}
                              onClick={() => setCurrentPage(pageNum)}
                            >
                              {pageNum}
                            </button>
                          );
                        })}
                        
                        <button 
                          className="btn btn-outline-secondary"
                          onClick={() => setCurrentPage(prev => Math.min(totalPages, prev + 1))}
                          disabled={currentPage === totalPages}
                        >
                          <i className="bi bi-chevron-right"></i>
                        </button>
                        <button 
                          className="btn btn-outline-secondary"
                          onClick={() => setCurrentPage(totalPages)}
                          disabled={currentPage === totalPages}
                        >
                          <i className="bi bi-chevron-double-right"></i>
                        </button>
                      </div>
                    </div>
                  )}

                  <style jsx>{`
                    .cursor-pointer {
                      cursor: pointer;
                    }
                    .table-container::-webkit-scrollbar {
                      width: 8px;
                      height: 8px;
                    }
                    .table-container::-webkit-scrollbar-track {
                      background: #f1f1f1;
                    }
                    .table-container::-webkit-scrollbar-thumb {
                      background: #888;
                      border-radius: 4px;
                    }
                    .table-container::-webkit-scrollbar-thumb:hover {
                      background: #555;
                    }
                    thead th {
                      background-color: #f8f9fa;
                      font-weight: 600;
                      font-size: 0.875rem;
                      white-space: nowrap;
                    }
                    tbody td {
                      font-size: 0.875rem;
                    }
                  `}</style>
                </div>
              );
            }

            // Edit Item Modal Component
            function EditItemModal({ item, boardId, columns, users, onClose, onSave, partnerOptions, allianceManagerOptions, allowedColumns }) {
              const [formData, setFormData] = React.useState({});
              const [itemName, setItemName] = React.useState('');
              const [saving, setSaving] = React.useState(false);
              const [error, setError] = React.useState(null);

              React.useEffect(() => {
                // Initialize form data with item values
                const initialData = {};
                const warnings = [];

                Object.keys(item).forEach(key => {
                  if (!['Monday Item ID', 'Board ID', '_rowIndex'].includes(key)) {
                    const value = item[key] || '';
                    initialData[key] = value;

                    // Check if value is a deactivated label for status/color columns
                    const column = columns.find(col => col.title === key);
                    if (column && (column.type === 'status' || column.type === 'color') && value) {
                      if (column.settings && column.settings.labels) {
                        const validLabels = Object.values(column.settings.labels);
                        // Case-insensitive match to find the correct label
                        const valueLower = String(value).toLowerCase().trim();
                        const matchedLabel = validLabels.find(label =>
                          String(label).toLowerCase().trim() === valueLower
                        );

                        if (matchedLabel) {
                          // Use the exact label from settings to ensure proper matching
                          initialData[key] = matchedLabel;
                        } else {
                          warnings.push(`⚠️ "${key}" has value "${value}" that doesn't match any option. Valid options: ${validLabels.join(', ')}`);
                          console.warn(`Label not found in ${key}:`, value);
                          console.warn(`Valid labels:`, validLabels);
                          // Clear the invalid value
                          initialData[key] = '';
                        }
                      }
                    }
                  }
                });

                // Note: For MarketingApproval, Partner Name is ignored - only Partner field is used
                // This code is preserved but commented out per user requirement to not delete code
                // If Partner field is empty but Partner Name has a value, DO NOT use Partner Name
                // The Partner column in MarketingApproval sheet is the single source of truth

                console.log('Partner value in formData:', initialData['Partner']);
                console.log('Partner Name value in formData (not used for MarketingApproval):', initialData['Partner Name']);

                if (warnings.length > 0) {
                  console.warn('=== LABEL MATCHING WARNINGS ===');
                  warnings.forEach(w => console.warn(w));
                  setError('Some fields had values that were adjusted to match dropdown options. Check console for details.');
                }

                setFormData(initialData);
                setItemName(item['Item Name'] || item['Name'] || '');
              }, [item, columns]);

              const handleChange = (columnTitle, value) => {
                setFormData(prev => ({ ...prev, [columnTitle]: value }));
              };

              const handleSave = async () => {
                setSaving(true);
                setError(null);

                try {
                  // Filter out virtual/calculated columns before saving
                  const validColumns = {};
                  columns.forEach(col => {
                    if (formData.hasOwnProperty(col.title) &&
                        !['Monday Item ID', 'Board ID', 'Board Name', 'Group', 'Item Name',
                          'daysWaiting', 'urgencyLevel', 'status', 'healthScore', 'healthStatus',
                          'Overdue items', 'Stuck or Blocked items', 'Not Started items',
                          'Completed Last 30 Days', 'Formula', 'Long text',
                          'Scope Document Public URL'].includes(col.title)) {
                      validColumns[col.title] = formData[col.title];
                    }
                  });

                  // Update item name if changed
                  if (itemName !== (item['Item Name'] || item['Name'])) {
                    await api.call('updateMondayItemName', boardId, item['Monday Item ID'], itemName);
                  }

                  // Update column values
                  const result = await api.call(
                    'updateMondayItemMultipleColumns',
                    boardId,
                    item['Monday Item ID'],
                    validColumns,
                    columns
                  );

                  if (result.success) {
                    onSave({ ...formData, 'Item Name': itemName, 'Name': itemName });
                  } else {
                    setError(result.error || 'Failed to update item');
                  }
                } catch (err) {
                  setError(err.message || 'Failed to update item');
                } finally {
                  setSaving(false);
                }
              };

                  emptyMessage="No partner data available"
                  maxHeight="500px"
                  searchable={true}
                  searchFields={['Partner Name', 'Item', 'Temperature', 'Engagement']}
                />

                <div className="mt-3 d-flex justify-content-center">
                  <div className="d-flex gap-2 align-items-center">
                    <small className="text-muted">Temperature Legend:</small>
                    <span className="badge bg-success">🟢 Hot/Green</span>
                    <span className="badge bg-warning">🟡 Warm/Yellow</span>
                    <span className="badge bg-danger">🔴 Cool/Cold/Red</span>
                  </div>
                </div>

                {/* Edit Modal - Only Temperature, Engagement, Activities, Description */}
                {editingItem && (
                  <EditItemModal
                    item={editingItem}
                    boardId={editingItem['Board ID']}
                    columns={columns}
                    users={users}
                    allowedColumns={['Temperature', 'Engagement', 'Summary of Partner Activities', 'Partner Description']}
                    onClose={() => setEditingItem(null)}
                    onSave={handleSaveEdit}
                  />
                )}
              </div>
              
              <style jsx>{`
                .table-success {
                  background-color: rgba(25, 135, 84, 0.15) !important;
                }
                .table-warning {
                  background-color: rgba(255, 193, 7, 0.15) !important;
                }
                .table-danger {
                  background-color: rgba(220, 53, 69, 0.15) !important;
                }
              `}</style>
            </div>
          );
        }


        // Add Marketing Request Modal Component
        function AddMarketingRequestModal({ boardId, columns, users, onClose, onCreate, partnerOptions, allianceManagerOptions }) {
          const [formData, setFormData] = React.useState({});
          const [itemName, setItemName] = React.useState('');
          const [creating, setCreating] = React.useState(false);
          const [error, setError] = React.useState(null);

          const handleChange = (columnTitle, value) => {
            setFormData(prev => ({ ...prev, [columnTitle]: value }));
          };

          const handleCreate = async () => {
            if (!itemName.trim()) {
              setError('Event name is required');
              return;
            }

            setCreating(true);
            setError(null);

            try {
              // Add auto-populated fields
              const today = new Date().toISOString().split('T')[0];
              const dataWithDefaults = {
                ...formData,
                'Create Date': today,
                'Overall Status': 'Submitted'
              };

              const result = await api.call(
                'createMondayItem',
                boardId,
                itemName,
                dataWithDefaults,
                columns
              );

              if (result.success) {
                onCreate({ ...dataWithDefaults, 'Item Name': itemName, 'Monday Item ID': result.itemId });
              } else {
                setError(result.error || 'Failed to create item');
              }
            } catch (err) {
              setError(err.message || 'Failed to create item');
            } finally {
              setCreating(false);
            }
          };

          const renderField = (fieldConfig) => {
            const { name, label, type, options, required } = fieldConfig;
            const value = formData[name] || '';

            switch (type) {
              case 'dropdown':
                return (
                  <div className="mb-3" key={name}>
                    <label className="form-label">{label}{required && ' *'}</label>
                    <select
                      className="form-select"
                      value={value}
                      onChange={(e) => handleChange(name, e.target.value)}
                      required={required}
                    >
                      <option value="">Select...</option>
                      {options.map((opt, idx) => (
                        <option key={idx} value={opt}>{opt}</option>
                      ))}
                    </select>
                  </div>
                );

              case 'multi-select':
                // For Alliance Manager multi-select
                return (
                  <div className="mb-3" key={name}>
                    <label className="form-label">{label}{required && ' *'}</label>
                    <select
                      className="form-select"
                      multiple
                      value={Array.isArray(value) ? value : (value ? [value] : [])}
                      onChange={(e) => {
                        const selected = Array.from(e.target.selectedOptions, option => option.value);
                        handleChange(name, selected);
                      }}
                      style={{ height: '120px' }}
                    >
                      {options.map((opt, idx) => (
                        <option key={idx} value={opt}>{opt}</option>
                      ))}
                    </select>
                    <small className="form-text text-muted">Hold Ctrl/Cmd to select multiple</small>
                  </div>
                );

              case 'number':
                return (
                  <div className="mb-3" key={name}>
                    <label className="form-label">{label}{required && ' *'}</label>
                    <input
                      type="number"
                      className="form-control"
                      value={value}
                      onChange={(e) => handleChange(name, e.target.value)}
                      required={required}
                    />
                  </div>
                );

              case 'date':
                return (
                  <div className="mb-3" key={name}>
                    <label className="form-label">{label}{required && ' *'}</label>
                    <input
                      type="date"
                      className="form-control"
                      value={value}
                      onChange={(e) => handleChange(name, e.target.value)}
                      required={required}
                    />
                  </div>
                );

              case 'textarea':
                return (
                  <div className="mb-3" key={name}>
                    <label className="form-label">{label}{required && ' *'}</label>
                    <textarea
                      className="form-control"
                      rows="3"
                      value={value}
                      onChange={(e) => handleChange(name, e.target.value)}
                      required={required}
                    />
                  </div>
                );

              case 'url':
              case 'text':
              default:
                return (
                  <div className="mb-3" key={name}>
                    <label className="form-label">{label}{required && ' *'}</label>
                    <input
                      type={type === 'url' ? 'url' : 'text'}
                      className="form-control"
                      value={value}
                      onChange={(e) => handleChange(name, e.target.value)}
                      required={required}
                    />
                  </div>
                );
            }
          };

          // Get dropdown options from columns
          const getColumnOptions = (columnName) => {
            const column = columns.find(col => col.title === columnName);
            if (column && column.settings && column.settings.labels) {
              return Object.values(column.settings.labels);
            }
            return [];
          };

          // Define fields to display
          const fields = [
            { name: 'Priority', label: 'Priority', type: 'dropdown', options: getColumnOptions('Priority'), required: true },
            { name: 'AllianceManager', label: 'Alliance Manager', type: 'multi-select', options: allianceManagerOptions || [], required: true },
            { name: 'Partner', label: 'Partner', type: 'dropdown', options: partnerOptions || [], required: false },
            { name: 'Event URL', label: 'Event URL', type: 'url', required: false },
            { name: 'Requesting Department', label: 'Requesting Department', type: 'dropdown', options: getColumnOptions('Requesting Department'), required: true },
            { name: 'Cost', label: 'Cost', type: 'number', required: false },
            { name: 'Date and Location', label: 'Date and Location', type: 'text', required: false },
            { name: 'Start Date', label: 'Event Date', type: 'date', required: false },
            { name: 'Request Type', label: 'Request Type', type: 'dropdown', options: getColumnOptions('Request Type'), required: true },
            { name: 'Funding Type', label: 'Funding Type', type: 'dropdown', options: getColumnOptions('Funding Type'), required: false },
            { name: 'Urgency', label: 'Urgency', type: 'dropdown', options: getColumnOptions('Urgency'), required: true },
            { name: 'Number of Meetings or Receptions', label: 'Number of Meetings', type: 'number', required: false },
            { name: 'Total Audience', label: 'Total Audience', type: 'number', required: false },
            { name: 'Expected Attendance', label: 'Expected Attendance', type: 'number', required: false },
            { name: 'Speaking Opportunity', label: 'Speaking Opportunity', type: 'text', required: false },
            { name: 'Brand Details', label: 'Brand Details', type: 'textarea', required: false },
            { name: 'Justification Link', label: 'Justification Link', type: 'url', required: false }
          ];

          return (
            <div className="modal fade show" style={{ display: 'block', backgroundColor: 'rgba(0,0,0,0.5)' }}>
              <div className="modal-dialog modal-lg modal-dialog-scrollable">
                <div className="modal-content">
                  <div className="modal-header">
                    <h5 className="modal-title">Create New Marketing Request</h5>
                    <button type="button" className="btn-close" onClick={onClose}></button>
                  </div>
                  <div className="modal-body">
                    {error && (
                      <div className="alert alert-danger">
                        {error}
                      </div>
                    )}
                    <form>
                      <div className="mb-3">
                        <label className="form-label"><strong>Event *</strong></label>
                        <input
                          type="text"
                          className="form-control"
                          value={itemName}
                          onChange={(e) => setItemName(e.target.value)}
                          placeholder="Enter event name"
                          required
                        />
                      </div>
                      <hr />
                      {fields.map(field => renderField(field))}
                    </form>
                  </div>
                  <div className="modal-footer">
                    <button type="button" className="btn btn-secondary" onClick={onClose} disabled={creating}>
                      Cancel
                    </button>
                    <button type="button" className="btn btn-success" onClick={handleCreate} disabled={creating}>
                      {creating ? (
                        <>
                          <span className="spinner-border spinner-border-sm me-2"></span>
                          Creating...
                        </>
                      ) : (
                        'Create Request'
                      )}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        }


        function MarketingApprovals({ manager }) {
          const [approvals, setApprovals] = React.useState([]);
          const [loading, setLoading] = React.useState(false);
          const [error, setError] = React.useState(null);

          // Edit/Delete states
          const [editingItem, setEditingItem] = React.useState(null);
          const [deletingItem, setDeletingItem] = React.useState(null);
          const [columns, setColumns] = React.useState([]);
          const [users, setUsers] = React.useState([]);
          const [partnerOptions, setPartnerOptions] = React.useState([]);
          const [allianceManagerOptions, setAllianceManagerOptions] = React.useState([]);

          // Add Item state
          const [showAddModal, setShowAddModal] = React.useState(false);
          const [boardId, setBoardId] = React.useState(null);

          React.useEffect(() => {
            loadApprovals();
          }, [manager]);

          const loadApprovals = async (syncFirst = false) => {
            if (!manager) return;

            setLoading(true);
            setError(null);

            try {
              // If syncFirst is true, sync Monday data to sheets first
              if (syncFirst) {
                console.log('Syncing Marketing boards from Monday...');
                await window.google.script.run
                  .withSuccessHandler(() => {
                    console.log('Marketing boards synced successfully');
                  })
                  .withFailureHandler(error => {
                    console.error('Error syncing boards:', error);
                    // Continue to load even if sync fails
                  })
                  .syncMarketingBoards();
              }

              const data = await window.google.script.run
                .withSuccessHandler(response => {
                  console.log('Marketing approvals response:', response);
                  setApprovals(response || []);
                  setLoading(false);

                  // Load column metadata for the first board ID we find
                  if (response && response.length > 0 && response[0]['Board ID']) {
                    loadColumnMetadata(response[0]['Board ID']);
                  }
                })
                .withFailureHandler(error => {
                  console.error('Error loading marketing approvals:', error);
                  setError(error.message);
                  setLoading(false);
                })
                .getMarketingApprovals(manager);
            } catch (error) {
              console.error('Error loading marketing approvals:', error);
              setError(error.message);
              setLoading(false);
            }
          };

          const loadColumnMetadata = (boardId) => {
            setBoardId(boardId);

            google.script.run
              .withSuccessHandler((cols) => {
                setColumns(cols || []);
              })
              .withFailureHandler((error) => {
                console.error('Error loading columns:', error);
              })
              .getMondayBoardColumns(boardId);

            google.script.run
              .withSuccessHandler((usersData) => {
                setUsers(usersData || []);
              })
              .withFailureHandler((error) => {
                console.error('Error loading users:', error);
              })
              .getMondayBoardUsers(boardId);

            // Load partner names from Partner sheet (A2:A)
            google.script.run
              .withSuccessHandler((partners) => {
                console.log('Partner options loaded:', partners ? partners.length : 0, 'partners');
                setPartnerOptions(partners || []);
              })
              .withFailureHandler((error) => {
                console.error('Error loading partner names:', error);
                setPartnerOptions([]); // Set empty array on failure so button isn't stuck disabled
              })
              .getPartnerNamesFromSheet();

            // Load alliance manager names from TechAllianceManager sheet (A2:A)
            google.script.run
              .withSuccessHandler((managers) => {
                console.log('Alliance Manager options loaded:', managers ? managers.length : 0, 'managers');
                setAllianceManagerOptions(managers || []);
              })
              .withFailureHandler((error) => {
                console.error('Error loading alliance manager names:', error);
                setAllianceManagerOptions([]);
              })
              .getAllianceManagerNamesFromSheet();
          };

          const handleEdit = (approval) => {
            setEditingItem(approval);
          };

          const handleDelete = (approval) => {
            setDeletingItem(approval);
          };

          const handleSaveEdit = async (updatedData) => {
            setApprovals(prev => prev.map(app =>
              app['Monday Item ID'] === editingItem['Monday Item ID']
                ? { ...app, ...updatedData }
                : app
            ));
            setEditingItem(null);
            // Don't sync immediately after edit - Monday needs time to propagate changes
            // The next manual refresh will sync if needed
          };

          const handleAddNew = () => {
            setShowAddModal(true);
          };

          const handleSaveNew = async (newItemData) => {
            // Reload approvals after adding new item with sync
            await loadApprovals(true);
            setShowAddModal(false);
          };

          const handleConfirmDelete = async () => {
            try {
              const result = await api.call('deleteMondayItem', deletingItem['Monday Item ID']);
              if (result.success) {
                setApprovals(prev => prev.filter(app =>
                  app['Monday Item ID'] !== deletingItem['Monday Item ID']
                ));
                setDeletingItem(null);
              } else {
                alert('Failed to delete item: ' + (result.error || 'Unknown error'));
              }
            } catch (error) {
              alert('Failed to delete item: ' + error.message);
            }
          };

          const tableColumns = [
            { key: 'Item Name', label: 'Event' },
            { key: 'Requesting Department', label: 'Requesting Department' },
            { key: 'Overall Status', label: 'Status' },
            { key: 'Priority', label: 'Priority' },
            { key: 'Start Date', label: 'Event Date' },
            { key: 'Cost', label: 'Cost' },
            { key: 'actions', label: 'Actions' }
          ];

          const renderRow = (approval, index) => {
            const daysWaiting = parseInt(approval.daysWaiting) || 0;
            const isUrgent = daysWaiting > 7;

            return (
              <tr key={index} className={isUrgent ? 'table-warning' : ''}>
                <td>
                  <div className="text-truncate" style={{ maxWidth: '200px' }}>
                    <div className="fw-semibold" title={approval['Item Name']}>
                      {approval['Item Name'] || 'Unnamed Event'}
                    </div>
                    {approval['Date and Location'] && (
                      <small className="text-muted">
                        📍 {approval['Date and Location']}
                      </small>
                    )}
                  </div>
                </td>
                <td>
                  <div className="text-truncate" style={{ maxWidth: '150px' }} title={approval['Requesting Department']}>
                    {approval['Requesting Department'] || 'N/A'}
                  </div>
                </td>
                <td>
                  <span className={`badge bg-${getStatusColor(approval['Overall Status'])}`}>
                    {approval['Overall Status'] || 'Pending'}
                  </span>
                </td>
                <td>
                  {getPriorityBadge(approval['Priority'])}
                </td>
                <td>
                  {formatDate(approval['Start Date'])}
                </td>
                <td>
                  {approval['Cost'] ? (
                    <span className="fw-semibold">
                      ${parseFloat(approval['Cost']).toLocaleString()}
                    </span>
                  ) : (
                    <span className="text-muted">N/A</span>
                  )}
                </td>
                <td>
                  <div className="btn-group btn-group-sm">
                    <button
                      className="btn btn-outline-primary btn-sm"
                      onClick={(e) => { e.stopPropagation(); handleEdit(approval); }}
                      title="Edit"
                    >
                      <i className="bi bi-pencil"></i>
                    </button>
                    <button
                      className="btn btn-outline-danger btn-sm"
                      onClick={(e) => { e.stopPropagation(); handleDelete(approval); }}
                      title="Delete"
                    >
                      <i className="bi bi-trash"></i>
                    </button>
                  </div>
                </td>
              </tr>
            );
          };

          const getStatusColor = (status) => {
            const statusStr = String(status).toLowerCase();
            if (statusStr.includes('approved')) return 'success';
            if (statusStr.includes('rejected')) return 'danger';
            if (statusStr.includes('pending')) return 'warning';
            return 'secondary';
          };

          const getPriorityBadge = (priority) => {
            const priorityStr = String(priority).toLowerCase();
            if (priorityStr.includes('1') || priorityStr.includes('high')) {
              return <span className="badge bg-danger">High</span>;
            } else if (priorityStr.includes('2') || priorityStr.includes('medium')) {
              return <span className="badge bg-warning">Medium</span>;
            }
            return <span className="badge bg-info">Low</span>;
          };

          const formatDate = (dateStr) => {
            if (!dateStr) return 'N/A';
            try {
              // Parse YYYY-MM-DD format to avoid timezone issues
              const match = String(dateStr).match(/^(\d{4})-(\d{2})-(\d{2})/);
              if (match) {
                const [, year, month, day] = match;
                const date = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
                return date.toLocaleDateString('en-US', {
                  month: 'short',
                  day: 'numeric',
                  year: 'numeric'
                });
              }
              return dateStr;
            } catch (e) {
              return dateStr;
            }
          };

          if (loading) {
            return (
              <div className="card h-100">
                <div className="card-header bg-warning bg-opacity-10">
                  <h5 className="mb-0">📋 Marketing Approvals</h5>
                </div>
                <div className="card-body">
                  <div className="text-center">
                    <div className="spinner-border text-warning" role="status">
                      <span className="visually-hidden">Loading...</span>
                    </div>
                  </div>
                </div>
              </div>
            );
          }

          if (error) {
            return (
              <div className="card h-100">
                <div className="card-header bg-warning bg-opacity-10">
                  <h5 className="mb-0">📋 Marketing Approvals</h5>
                </div>
                <div className="card-body">
                  <div className="alert alert-danger">
                    Error loading approvals: {error}
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="card h-100">
              <div className="card-header bg-warning bg-opacity-10 d-flex justify-content-between align-items-center">
                <h5 className="mb-0">📋 Marketing Approvals</h5>
                <div className="btn-group">
                  <button
                    className="btn btn-sm btn-warning"
                    onClick={handleAddNew}
                    disabled={!boardId || !columns.length || !partnerOptions || !allianceManagerOptions}
                    title={(!boardId || !columns.length || !partnerOptions || !allianceManagerOptions) ? "Loading data..." : "Add New Marketing Request"}
                  >
                    <i className="bi bi-plus-lg"></i> New Item
                  </button>
                  <button
                    className="btn btn-sm btn-outline-warning"
                    onClick={() => loadApprovals(true)}
                    title="Sync from Monday and Refresh"
                  >
                    <i className="bi bi-arrow-clockwise"></i>
                  </button>
                </div>
              </div>
              <div className="card-body">
                <ScrollableDataTable
                  data={approvals}
                  columns={tableColumns}
                  renderRow={renderRow}
                  title="Pending Approvals"
                  emptyMessage="No pending marketing approvals"
                  maxHeight="500px"
                  searchable={true}
                  searchFields={['Item Name', 'Partner Name', 'Overall Status']}
                />

                {/* Edit Modal */}
                {editingItem && (
                  <EditItemModal
                    item={editingItem}
                    boardId={editingItem['Board ID']}
                    columns={columns}
                    users={users}
                    partnerOptions={partnerOptions}
                    allianceManagerOptions={allianceManagerOptions}
                    onClose={() => setEditingItem(null)}
                    onSave={handleSaveEdit}
                  />
                )}

                {/* Delete Confirmation Modal */}
                {deletingItem && (
                  <DeleteConfirmModal
                    item={deletingItem}
                    onClose={() => setDeletingItem(null)}
                    onConfirm={handleConfirmDelete}
                  />
                )}

                {/* Add New Item Modal */}
                {showAddModal && (
                  <AddMarketingRequestModal
                    boardId={boardId}
                    columns={columns}
                    users={users}
                    partnerOptions={partnerOptions}
                    allianceManagerOptions={allianceManagerOptions}
                    onClose={() => setShowAddModal(false)}
                    onCreate={handleSaveNew}
                  />
                )}
              </div>
            </div>
          );
        }
        
       
        
        // Main App Component
          const App = () => {
              const [darkMode, setDarkMode] = useState(false);
              const [currentManager, setCurrentManager] = useState(window.appConfig?.user || '');
              const [loading, setLoading] = useState(false);
              
              useEffect(() => {
                  // Apply dark mode
                  document.documentElement.setAttribute('data-bs-theme', darkMode ? 'dark' : 'light');
                  
                  // Save preference
                  try {
                      localStorage.setItem('darkMode', darkMode);
                  } catch (e) {
                      // Handle localStorage errors
                  }
              }, [darkMode]);
              
              useEffect(() => {
                  // Load dark mode preference
                  try {
                      const savedDarkMode = localStorage.getItem('darkMode') === 'true';
                      setDarkMode(savedDarkMode);
                  } catch (e) {
                      // Handle localStorage errors
                  }
              }, []);
              
              const toggleDarkMode = () => {
                  setDarkMode(!darkMode);
              };
              
              const handleRefresh = async () => {
                  setLoading(true);
                  // Trigger refresh in child components
                  setTimeout(() => setLoading(false), 1000);
              };
              
              return (
                  <AppContext.Provider value={{ currentManager, darkMode }}>
                      <div className="app-container">
                          {/* Navigation */}
                          <nav className="navbar navbar-expand-lg navbar-dark navbar-custom">
                              <div className="container-fluid">
                                  <a className="navbar-brand" href="#">
                                      <i className="bi bi-grid-3x3-gap-fill"></i>
                                      Alliance Manager Portal
                                  </a>
                                  <div className="d-flex align-items-center gap-3">
                                      <span className="text-white small">
                                          {currentManager}
                                      </span>
                                      <button 
                                          className="theme-toggle"
                                          onClick={toggleDarkMode}
                                          title={darkMode ? 'Light Mode' : 'Dark Mode'}
                                      >
                                          <i className={`bi bi-${darkMode ? 'sun' : 'moon'}`}></i>
                                      </button>
                                  </div>
                              </div>
                          </nav>
                          
                          {/* Main Content */}
                          <div className="main-content">
                              <div className="container-fluid">
                                  {/* First Row - Marketing Approvals & Marketing Calendar */}
                                  <div className="row mb-3">
                                      <div className="col-lg-6 mb-3 mb-lg-0">
                                          <MarketingApprovals manager={currentManager} />
                                      </div>
                                      <div className="col-lg-6">
                                          <MarketingCalendar manager={currentManager} />
                                      </div>
                                  </div>
                                  
                                  {/* Second Row - Activity Tracker (with Partner Activities & Partner Health Heatmap tabs) & Internal Activities */}
                                  <div className="row mb-3">
                                      <div className="col-xl-6 mb-3 mb-xl-0">
                                          <ActivityTracker manager={currentManager} />
                                      </div>
                                      <div className="col-xl-6">
                                          <InternalActivitiesCard manager={currentManager} />
                                      </div>
                                  </div>
                              </div>
                          </div>
                          
                          {/* Footer */}
                          <footer className="bg-dark text-light text-center py-2 mt-3">
                              <small>
                                  © 2025 Guidewire Software. Alliance Manager Portal v2.0
                              </small>
                          </footer>
                      </div>
                  </AppContext.Provider>
              );
          };
        
        // Render the app
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
